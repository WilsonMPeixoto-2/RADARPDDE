name: Apply agent patch

on:
  push:
    branches:
      - feature/supabase-readiness
    paths:
      - '.github/agent-change.patch.b64'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout do branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: feature/supabase-readiness
          fetch-depth: 2

      - name: Aplicar alteração versionada
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .github/agent-change.patch.b64 > /tmp/agent-change.patch
          git apply --index --whitespace=fix /tmp/agent-change.patch
          git rm --cached .github/agent-change.patch.b64
          rm -f .github/agent-change.patch.b64
          git config user.name 'RADAR Gate Automation'
          git config user.email 'actions@users.noreply.github.com'
          git commit -m 'feat: concluir contratos e migração reversível'
          git push origin HEAD:feature/supabase-readiness
