name: Apply agent patch

on:
  pull_request:
    paths:
      - '.github/agent-apply.ready'
  push:
    branches:
      - feature/supabase-readiness
    paths:
      - '.github/agent-apply.ready'

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout do branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: feature/supabase-readiness
          fetch-depth: 2

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Baixar componentes do patch
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/22/comments?per_page=100" \
            > /tmp/comments.json
          {
            jq -r '[.[] | select(.body | startswith("RADAR_PATCH_PART_"))]
              | sort_by(.body | capture("RADAR_PATCH_PART_(?<part>[0-9]+)").part | tonumber)
              | .[].body
              | sub("^RADAR_PATCH_PART_[0-9]+\\n"; "")' /tmp/comments.json \
              | tr -d '\n'
            cat .github/agent-payload-*
          } > /tmp/agent-change.patch.gz.b64

      - name: Verificar integridade do payload
        shell: bash
        run: |
          set -euo pipefail
          actual_bytes="$(wc -c < /tmp/agent-change.patch.gz.b64)"
          actual_sha="$(sha256sum /tmp/agent-change.patch.gz.b64 | cut -d' ' -f1)"
          test "${actual_bytes}" = '47968'
          test "${actual_sha}" = 'c16cc5ed78d1b1ee4b198df026ada30cd1e111ad9d30271a102d0aebf6537b5e'

      - name: Decodificar patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode /tmp/agent-change.patch.gz.b64 \
            | gzip --decompress \
            > /tmp/agent-change.patch
          test -s /tmp/agent-change.patch

      - name: Validar aplicação do patch
        run: git apply --check --whitespace=fix /tmp/agent-change.patch

      - name: Aplicar patch
        run: git apply --index --whitespace=fix /tmp/agent-change.patch

      - name: Instalar dependências reproduzíveis
        run: npm install --ignore-scripts

      - name: Gerar bundle Ajv
        run: npm run build:ajv

      - name: Preparar índice sem alterações de workflows
        shell: bash
        run: |
          set -euo pipefail
          git restore --source=HEAD --staged --worktree \
            .github/workflows/supabase-readiness.yml \
            .github/workflows/validate.yml
          git rm .github/agent-apply.ready .github/agent-payload-*
          git add package-lock.json vendor/ajv.js

      - name: Criar commit funcional
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'RADAR Gate Automation'
          git config user.email 'actions@users.noreply.github.com'
          git commit -m 'feat: concluir contratos e migração reversível'
          echo "RADAR_COMMIT_SHA=$(git rev-parse HEAD)" >> "${GITHUB_ENV}"
          echo "RADAR_TREE_SHA=$(git rev-parse HEAD^{tree})" >> "${GITHUB_ENV}"

      - name: Registrar SHA do commit no PR
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          body="RADAR_FUNCTIONAL_COMMIT_SHA=${RADAR_COMMIT_SHA}\nRADAR_FUNCTIONAL_TREE_SHA=${RADAR_TREE_SHA}"
          jq -n --arg body "${body}" '{body: $body}' > /tmp/comment.json
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'Content-Type: application/json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/22/comments" \
            --data-binary @/tmp/comment.json \
            > /tmp/comment-response.json

      - name: Tentar publicar commit funcional
        continue-on-error: true
        run: git push origin HEAD:feature/supabase-readiness
