name: Apply agent patch

on:
  pull_request:
    paths:
      - '.github/agent-apply.ready'
  push:
    branches:
      - feature/supabase-readiness
    paths:
      - '.github/agent-apply.ready'

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout do branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: feature/supabase-readiness
          fetch-depth: 2

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Reconstituir e aplicar alteração versionada
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/22/comments?per_page=100" \
            > /tmp/comments.json
          {
            jq -r '[.[] | select(.body | startswith("RADAR_PATCH_PART_"))]
              | sort_by(.body | capture("RADAR_PATCH_PART_(?<part>[0-9]+)").part | tonumber)
              | .[].body
              | sub("^RADAR_PATCH_PART_[0-9]+\\n"; "")' /tmp/comments.json \
              | tr -d '\n'
            cat .github/agent-payload-*
          } > /tmp/agent-change.patch.gz.b64
          test "$(wc -c < /tmp/agent-change.patch.gz.b64)" = '47968'
          echo 'c16cc5ed78d1b1ee4b198df026ada30cd1e111ad9d30271a102d0aebf6537b5e  /tmp/agent-change.patch.gz.b64' \
            | sha256sum --check --strict
          base64 --decode /tmp/agent-change.patch.gz.b64 \
            | gzip --decompress \
            > /tmp/agent-change.patch
          test -s /tmp/agent-change.patch
          git apply --index --whitespace=fix /tmp/agent-change.patch
          npm install --ignore-scripts
          npm run build:ajv
          git rm .github/agent-apply.ready .github/agent-payload-*
          git add package-lock.json vendor/ajv.js
          git config user.name 'RADAR Gate Automation'
          git config user.email 'actions@users.noreply.github.com'
          git commit -m 'feat: concluir contratos e migração reversível'
          git push origin HEAD:feature/supabase-readiness
