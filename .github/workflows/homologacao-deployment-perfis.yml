name: Homologar Production Supabase

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'app.js'
      - 'index.html'
      - 'styles.css'
      - 'src/**'
      - 'vendor/**'
      - 'scripts/build-vercel.mjs'
      - 'playwright.deployment.config.js'
      - 'tests/e2e/remote-deployment-contract.spec.js'
      - '.github/workflows/homologacao-deployment-perfis.yml'

permissions:
  contents: read

concurrency:
  group: homologacao-production-supabase-${{ github.ref }}
  cancel-in-progress: true

env:
  RADAR_DEPLOYMENT_URL: https://radarpdde-fix.vercel.app

jobs:
  deployment:
    name: Production Supabase — login, RLS anônima e responsividade
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Obter código
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm

      - name: Instalar dependências reproduzíveis
        run: npm ci

      - name: Instalar Chromium e WebKit
        run: npx playwright install --with-deps chromium webkit

      - name: Homologar contrato público do Supabase Production
        run: >-
          npx playwright test
          tests/e2e/remote-deployment-contract.spec.js
          --config=playwright.deployment.config.js

      - name: Publicar evidências de QA
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: homologacao-production-supabase-${{ github.run_id }}
          path: |
            playwright-report-deployment/
            test-results/
          if-no-files-found: warn
          retention-days: 14
