name: Configurar e publicar Preview Supabase

on:
  workflow_dispatch:
    inputs:
      publishable_key:
        description: Chave publicável sb_publishable_ do projeto Supabase
        required: true
        type: string
      confirmation:
        description: Digite PUBLICAR_PREVIEW_SUPABASE_RADAR_PDDE
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: radar-pdde-preview-supabase
  cancel-in-progress: false

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  RADAR_SUPABASE_URL_VALUE: https://scnryinorqeucbfkioxo.supabase.co
  RADAR_SUPABASE_PUBLISHABLE_KEY_VALUE: ${{ inputs.publishable_key }}

jobs:
  configurar-e-publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: preview
    steps:
      - name: Checkout do commit autorizado
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm

      - name: Instalar dependências reproduzíveis
        run: npm ci

      - name: Validar autorização e parâmetros públicos
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        shell: bash
        run: |
          test "${CONFIRMATION}" = "PUBLICAR_PREVIEW_SUPABASE_RADAR_PDDE"
          test -n "${VERCEL_TOKEN}"
          test -n "${VERCEL_ORG_ID}"
          test -n "${VERCEL_PROJECT_ID}"
          test "${RADAR_SUPABASE_URL_VALUE}" = "https://scnryinorqeucbfkioxo.supabase.co"
          case "${RADAR_SUPABASE_PUBLISHABLE_KEY_VALUE}" in
            sb_publishable_*) ;;
            *) exit 1 ;;
          esac
          echo "::add-mask::${RADAR_SUPABASE_PUBLISHABLE_KEY_VALUE}"

      - name: Vincular configuração isolada do Preview
        run: npx --yes vercel@56.2.0 pull --yes --environment=preview --token="${VERCEL_TOKEN}"

      - name: Configurar variáveis públicas somente no Preview
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' 'supabase-preview' | npx --yes vercel@56.2.0 env add RADAR_DATA_MODE preview --force --token="${VERCEL_TOKEN}"
          printf '%s' 'preview' | npx --yes vercel@56.2.0 env add RADAR_ENVIRONMENT preview --force --token="${VERCEL_TOKEN}"
          printf '%s' 'true' | npx --yes vercel@56.2.0 env add RADAR_SUPABASE_REPOSITORY_ENABLED preview --force --token="${VERCEL_TOKEN}"
          printf '%s' "${RADAR_SUPABASE_URL_VALUE}" | npx --yes vercel@56.2.0 env add RADAR_SUPABASE_URL preview --force --token="${VERCEL_TOKEN}"
          printf '%s' "${RADAR_SUPABASE_PUBLISHABLE_KEY_VALUE}" | npx --yes vercel@56.2.0 env add RADAR_SUPABASE_PUBLISHABLE_KEY preview --force --token="${VERCEL_TOKEN}"
          printf '%s' 'false' | npx --yes vercel@56.2.0 env add RADAR_SUPABASE_PRODUCTION_ACTIVATION_APPROVED preview --force --token="${VERCEL_TOKEN}"

      - name: Atualizar configuração local do Preview
        run: npx --yes vercel@56.2.0 pull --yes --environment=preview --token="${VERCEL_TOKEN}"

      - name: Executar build versionado da Vercel
        run: npx --yes vercel@56.2.0 build --token="${VERCEL_TOKEN}"

      - name: Confirmar manifesto público do Preview antes do deploy
        shell: bash
        run: |
          test -f dist/radar-build-manifest.json
          node <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('dist/radar-build-manifest.json', 'utf8'));
          const expected = {
            vercelEnvironment: 'preview',
            runtimeEnvironment: 'preview',
            dataMode: 'supabase-preview',
            supabaseRepositoryEnabled: true,
            productionActivationApproved: false
          };
          for (const [key, value] of Object.entries(expected)) {
            if (manifest[key] !== value) throw new Error(`Manifesto de Preview inválido em ${key}`);
          }
          const serialized = JSON.stringify(manifest);
          if (/sb_secret_|password|publishableKey|supabaseUrl/i.test(serialized)) {
            throw new Error('Manifesto contém campo ou material público proibido.');
          }
          NODE

      - name: Publicar somente o artefato prebuilt de Preview
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          npx --yes vercel@56.2.0 deploy --prebuilt --token="${VERCEL_TOKEN}" 2>&1 | tee /tmp/vercel-preview-deploy.log
          PREVIEW_URL="$(grep -Eo 'https://[^ ]+\.vercel\.app' /tmp/vercel-preview-deploy.log | tail -n 1)"
          test -n "${PREVIEW_URL}"
          echo "preview_url=${PREVIEW_URL}" >> "${GITHUB_OUTPUT}"

      - name: Validar manifesto publicado do Preview
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        shell: bash
        run: |
          curl --fail --silent --show-error "${PREVIEW_URL}/radar-build-manifest.json" -o /tmp/radar-preview-manifest.json
          node <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('/tmp/radar-preview-manifest.json', 'utf8'));
          const expected = {
            runtimeEnvironment: 'preview',
            dataMode: 'supabase-preview',
            supabaseRepositoryEnabled: true,
            productionActivationApproved: false
          };
          for (const [key, value] of Object.entries(expected)) {
            if (manifest[key] !== value) throw new Error(`Preview publicado inválido em ${key}`);
          }
          NODE

      - name: Confirmar que Production permanece local
        shell: bash
        run: |
          curl --fail --silent --show-error "https://radarpdde-fix.vercel.app/radar-build-manifest.json" -o /tmp/radar-production-manifest.json
          node <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('/tmp/radar-production-manifest.json', 'utf8'));
          const expected = {
            runtimeEnvironment: 'local',
            dataMode: 'local',
            supabaseRepositoryEnabled: false,
            productionActivationApproved: false
          };
          for (const [key, value] of Object.entries(expected)) {
            if (manifest[key] !== value) throw new Error(`Production alterada indevidamente em ${key}`);
          }
          NODE

      - name: Publicar manifesto do Preview como evidência
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: radar-preview-supabase-manifest-${{ github.run_id }}
          path: dist/radar-build-manifest.json
          if-no-files-found: warn
          retention-days: 14
