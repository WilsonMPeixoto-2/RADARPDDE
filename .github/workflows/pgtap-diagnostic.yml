name: Diagnosticar pgTAP

on:
  pull_request:
    paths:
      - '.github/workflows/pgtap-diagnostic.yml'
      - 'supabase/**'

permissions:
  contents: read

env:
  SUPABASE_TELEMETRY_DISABLED: '1'

jobs:
  pgtap:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Obter branch de ativação
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: activate/supabase-production

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Iniciar Supabase local e recriar banco
        run: |
          npm run supabase:start
          npm run supabase:reset

      - name: Executar pgTAP com diagnóstico
        id: pgtap
        shell: bash
        run: |
          set +e
          npm run supabase:test:db > pgtap-diagnostic.log 2>&1
          status=$?
          cat pgtap-diagnostic.log
          exit "${status}"

      - name: Publicar diagnóstico pgTAP
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pgtap-diagnostic-${{ github.run_id }}
          path: pgtap-diagnostic.log
          if-no-files-found: error
          retention-days: 1

      - name: Encerrar Supabase local
        if: ${{ always() }}
        run: npm run supabase:stop || true
