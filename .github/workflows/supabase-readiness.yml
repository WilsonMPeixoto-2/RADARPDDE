name: Supabase readiness

on:
  pull_request:
    paths:
      - 'app.js'
      - 'index.html'
      - 'config.js'
      - '.env.example'
      - 'src/**'
      - 'vendor/**'
      - 'scripts/check-supabase-readiness.js'
      - 'scripts/check-generated-artifacts.js'
      - 'scripts/build-supabase-client.mjs'
      - 'scripts/audit-functional-persistence.js'
      - 'supabase/**'
      - 'tests/unit/**'
      - 'tests/e2e/supabase-local-mode.spec.js'
      - 'tests/e2e/exercise-management.spec.js'
      - 'tests/e2e/frontend-contract.spec.js'
      - 'docs/architecture/supabase-readiness.md'
      - 'docs/reference/SUPABASE_*.md'
      - 'docs/runbooks/SUPABASE_*.md'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/supabase-readiness.yml'
  push:
    branches:
      - main
    paths:
      - 'app.js'
      - 'index.html'
      - 'config.js'
      - '.env.example'
      - 'src/**'
      - 'vendor/**'
      - 'scripts/check-supabase-readiness.js'
      - 'scripts/check-generated-artifacts.js'
      - 'scripts/build-supabase-client.mjs'
      - 'scripts/audit-functional-persistence.js'
      - 'supabase/**'
      - 'tests/unit/**'
      - 'tests/e2e/supabase-local-mode.spec.js'
      - 'tests/e2e/exercise-management.spec.js'
      - 'tests/e2e/frontend-contract.spec.js'
      - 'docs/architecture/supabase-readiness.md'
      - 'docs/reference/SUPABASE_*.md'
      - 'docs/runbooks/SUPABASE_*.md'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/supabase-readiness.yml'

permissions:
  contents: read

env:
  SUPABASE_TELEMETRY_DISABLED: '1'

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configurar Node.js LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependências reproduzíveis
        run: npm ci

      - name: Executar validação completa de prontidão
        run: npm run test:readiness

  migration-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: radar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d radar_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: radar_test

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Instalar cliente PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Aplicar bootstrap e todas as migrations
        run: |
          set -euo pipefail
          psql -v ON_ERROR_STOP=1 -f supabase/tests/bootstrap.sql
          for migration in supabase/migrations/*.sql; do
            echo "Aplicando ${migration}"
            psql -v ON_ERROR_STOP=1 -f "${migration}"
          done

      - name: Exercitar versão, auditoria, contexto e autorização
        run: psql -v ON_ERROR_STOP=1 -f supabase/tests/smoke.sql

  supabase-local:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configurar Node.js LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependências reproduzíveis
        run: npm ci

      - name: Iniciar Supabase local
        run: npm run supabase:start

      - name: Recriar banco com oito migrations
        run: npm run supabase:reset

      - name: Executar testes pgTAP
        run: npm run supabase:test:db

      - name: Regenerar tipos e cliente fixado
        run: |
          mkdir -p src/types
          npm run supabase:gen:types
          npm run build:supabase-client

      - name: Confirmar artefatos reproduzíveis
        run: npm run check:generated

      - name: Encerrar Supabase local
        if: always()
        run: npm run supabase:stop || true
