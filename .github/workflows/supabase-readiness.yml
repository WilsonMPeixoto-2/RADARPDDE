name: Supabase readiness

on:
  pull_request:
    paths:
      - 'app.js'
      - 'index.html'
      - 'config.js'
      - '.env.example'
      - 'src/**'
      - 'scripts/check-supabase-readiness.js'
      - 'scripts/audit-functional-persistence.js'
      - 'supabase/**'
      - 'tests/unit/**'
      - 'tests/e2e/supabase-local-mode.spec.js'
      - 'tests/e2e/exercise-management.spec.js'
      - 'tests/e2e/frontend-contract.spec.js'
      - 'docs/architecture/supabase-readiness.md'
      - 'docs/reference/SUPABASE_*.md'
      - 'docs/runbooks/SUPABASE_*.md'
      - 'package.json'
      - '.github/workflows/supabase-readiness.yml'
  push:
    branches:
      - main
    paths:
      - 'app.js'
      - 'index.html'
      - 'config.js'
      - '.env.example'
      - 'src/**'
      - 'scripts/check-supabase-readiness.js'
      - 'scripts/audit-functional-persistence.js'
      - 'supabase/**'
      - 'tests/unit/**'
      - 'tests/e2e/supabase-local-mode.spec.js'
      - 'tests/e2e/exercise-management.spec.js'
      - 'tests/e2e/frontend-contract.spec.js'
      - 'docs/architecture/supabase-readiness.md'
      - 'docs/reference/SUPABASE_*.md'
      - 'docs/runbooks/SUPABASE_*.md'
      - 'package.json'
      - '.github/workflows/supabase-readiness.yml'

permissions:
  contents: read

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package.json

      - name: Instalar dependências de auditoria
        run: npm install

      - name: Executar validação completa de prontidão
        run: npm run test:readiness

  migration-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: radar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d radar_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: radar_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar cliente PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Aplicar bootstrap e todas as migrations
        run: |
          set -euo pipefail
          psql -v ON_ERROR_STOP=1 -f supabase/tests/bootstrap.sql
          for migration in supabase/migrations/*.sql; do
            echo "Aplicando ${migration}"
            psql -v ON_ERROR_STOP=1 -f "${migration}"
          done

      - name: Exercitar versão, auditoria e contexto operacional
        run: |
          psql -v ON_ERROR_STOP=1 <<'SQL'
          insert into public.competences (id, label, exercise, bonus_deadline)
          values ('2026-01', 'Janeiro de 2026', 2026, '2026-02-15');

          insert into public.programs (id, name)
          values ('BASIC', 'PDDE Básico');

          insert into public.controllers (id, name)
          values ('controller-test', 'Controlador de teste');

          insert into public.inventory_team_members (id, name)
          values ('inventory-test', 'Inventariador de teste');

          insert into public.schools (
            id,
            designation,
            denomination,
            cre,
            controller_id,
            initial_competence
          ) values (
            '04.00.001',
            '04.00.001',
            'Escola de teste',
            '4ª CRE',
            'controller-test',
            '2026-01'
          );

          insert into public.verifications (
            id,
            school_id,
            competence_id,
            program_id,
            bonification,
            analysis
          ) values (
            '04.00.001::2026-01::BASIC',
            '04.00.001',
            '2026-01',
            'BASIC',
            '{}'::jsonb,
            '{}'::jsonb
          );

          insert into public.assets (
            id,
            school_id,
            competence_id,
            description,
            expense_type,
            invoice_number,
            amount,
            status,
            inventoried_by_member_id,
            inventoried_at
          ) values (
            'asset-test',
            '04.00.001',
            '2026-01',
            'Computador',
            'permanente',
            'NF-TEST',
            2500,
            'Inventariada',
            'inventory-test',
            '2026-01-20T12:00:00Z'
          );

          insert into public.registered_invoices (
            id,
            school_id,
            competence_id,
            program_id,
            verification_id,
            source_context_key,
            linked_asset_id,
            description,
            expense_type,
            invoice_number,
            amount,
            registered_at
          ) values (
            'invoice-test',
            '04.00.001',
            '2026-01',
            'BASIC',
            '04.00.001::2026-01::BASIC',
            '2026-01_BASIC',
            'asset-test',
            'Computador',
            'permanente',
            'NF-TEST',
            2500,
            '2026-01-10T12:00:00Z'
          );

          update public.schools
          set denomination = 'Escola de teste atualizada'
          where id = '04.00.001';

          do $$
          declare
              version_value integer;
              audit_count integer;
              invoice_context text;
              inventoried_member text;
          begin
              select row_version into version_value
              from public.schools
              where id = '04.00.001';

              if version_value <> 2 then
                  raise exception 'row_version esperado 2, encontrado %', version_value;
              end if;

              select count(*) into audit_count
              from public.audit_events
              where table_name = 'schools'
                and record_id = '04.00.001';

              if audit_count < 2 then
                  raise exception 'auditoria de schools incompleta: % eventos', audit_count;
              end if;

              select source_context_key into invoice_context
              from public.registered_invoices
              where id = 'invoice-test';

              if invoice_context <> '2026-01_BASIC' then
                  raise exception 'contexto da nota não preservado: %', invoice_context;
              end if;

              select inventoried_by_member_id into inventoried_member
              from public.assets
              where id = 'asset-test';

              if inventoried_member <> 'inventory-test' then
                  raise exception 'responsável da inventariação não preservado: %', inventoried_member;
              end if;
          end
          $$;
          SQL
