# Execução operacional temporária para materializar o artefato da ativação.
name: Validar snapshot canônico do RADAR

on:
  pull_request:
    paths:
      - 'app.js'
      - 'index.html'
      - 'src/data/**'
      - 'scripts/export-local-snapshot.mjs'
      - '.github/workflows/snapshot-canonico-radar.yml'
  push:
    branches:
      - main
    paths:
      - 'app.js'
      - 'index.html'
      - 'src/data/**'
      - 'scripts/export-local-snapshot.mjs'
      - '.github/workflows/snapshot-canonico-radar.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  RADAR_SNAPSHOT_FILE: ${{ runner.temp }}/radar-pdde-snapshot.json
  RADAR_SNAPSHOT_IMPORT_ID: radar-pdde-canonical-v1
  RADAR_SNAPSHOT_EXPORTED_AT: '2026-07-20T00:00:00.000Z'

jobs:
  snapshot-canonico:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm
      - name: Instalar dependências reproduzíveis
        run: npm ci
      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium
      - name: Iniciar aplicação estática limpa
        shell: bash
        run: |
          python3 -m http.server 4175 --bind 127.0.0.1 > /tmp/radar-snapshot-server.log 2>&1 &
          echo $! > /tmp/radar-snapshot-server.pid
          for tentativa in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4175/index.html > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/radar-snapshot-server.log
          exit 1
      - name: Exportar snapshot sanitizado
        run: npm run snapshot:export:local
      - name: Validar estrutura e contagens canônicas
        shell: bash
        run: |
          node <<'NODE'
          const crypto = require('node:crypto');
          const fs = require('node:fs');
          const snapshot = JSON.parse(fs.readFileSync(process.env.RADAR_SNAPSHOT_FILE, 'utf8'));
          const entities = snapshot.entities || {};
          const expectedCounts = {
            schools: 163,
            schoolPrograms: 430,
            userProfiles: 0,
            userSchoolScopes: 0,
            auditEvents: 0,
            dataImportRuns: 0
          };
          if (String(snapshot.version) !== '1') throw new Error(`Versão inválida: ${snapshot.version}`);
          if (Object.keys(entities).length !== 19) throw new Error(`Coleções inválidas: ${Object.keys(entities).length}`);
          for (const [entity, expected] of Object.entries(expectedCounts)) {
            const actual = Array.isArray(entities[entity]) ? entities[entity].length : -1;
            if (actual !== expected) throw new Error(`${entity}: esperado ${expected}, recebido ${actual}`);
          }
          const counts = Object.fromEntries(Object.keys(entities).sort().map(entity => [entity, entities[entity].length]));
          const domainHash = crypto.createHash('sha256').update(JSON.stringify(entities)).digest('hex');
          fs.writeFileSync(`${process.env.RADAR_SNAPSHOT_FILE}.summary.json`, `${JSON.stringify({ ok: true, version: snapshot.version, counts, domainHash }, null, 2)}\n`);
          console.log(JSON.stringify({ ok: true, counts, domainHash }, null, 2));
          NODE
      - name: Publicar snapshot canônico e resumo
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: radar-pdde-snapshot-canonico-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/radar-pdde-snapshot.json
            ${{ runner.temp }}/radar-pdde-snapshot.json.summary.json
          if-no-files-found: error
          retention-days: 7
      - name: Encerrar servidor local
        if: always()
        shell: bash
        run: |
          if test -f /tmp/radar-snapshot-server.pid; then
            kill "$(cat /tmp/radar-snapshot-server.pid)" || true
          fi
