name: Publicar artefato seguro em Production

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/build-production-artifact.yml'

permissions:
  contents: read

env:
  RADAR_ENVIRONMENT: local
  RADAR_DATA_MODE: local
  RADAR_SUPABASE_REPOSITORY_ENABLED: 'false'
  RADAR_PRODUCTION_ACTIVATION_APPROVED: 'false'
  VERCEL_ENV: production
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: team_EFJunPOtGozS99jZ6zkIQXHF
  VERCEL_PROJECT_ID: prj_GfXuUuO3dF2jykpp9QgyqIDsxg4U

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm
      - name: Instalar dependências
        run: npm ci
      - name: Confirmar credencial Vercel
        shell: bash
        run: test -n "${VERCEL_TOKEN:-}"
      - name: Obter configuração de Production
        run: npx --yes vercel@56.2.0 pull --yes --environment=production --token="${VERCEL_TOKEN}"
      - name: Executar build versionado de Production
        run: npx --yes vercel@56.2.0 build --prod --token="${VERCEL_TOKEN}"
      - name: Validar manifesto
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/radar-build-manifest.json
          node <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('dist/radar-build-manifest.json', 'utf8'));
          const expected = {
            vercelEnvironment: 'production',
            runtimeEnvironment: 'local',
            dataMode: 'local',
            supabaseRepositoryEnabled: false,
            productionActivationApproved: false
          };
          for (const [key, value] of Object.entries(expected)) {
            if (manifest[key] !== value) {
              throw new Error(`Manifesto inválido em ${key}: ${JSON.stringify(manifest[key])}`);
            }
          }
          NODE
      - name: Publicar somente o prebuilt em Production
        run: npx --yes vercel@56.2.0 deploy --prebuilt --prod --token="${VERCEL_TOKEN}"
      - name: Publicar manifesto como evidência
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: radar-production-manifest-${{ github.sha }}
          path: dist/radar-build-manifest.json
          if-no-files-found: warn
          retention-days: 1
