name: Exportar workspace Task 8

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export-workspace:
    if: github.head_ref == 'feature/ciclo-a-task-8-separacao-indicadores'
    runs-on: ubuntu-latest
    steps:
      - name: Obter branch completa
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Empacotar workspace com metadados Git
        run: tar --exclude='./node_modules' -czf /tmp/radar-task8-workspace.tgz .

      - name: Publicar workspace temporário
        uses: actions/upload-artifact@v4
        with:
          name: radar-task8-workspace
          path: /tmp/radar-task8-workspace.tgz
          retention-days: 1
