name: Corrigir acessibilidade focal

on:
  pull_request:
    paths:
      - '.github/workflows/fix-two-accessibility-issues.yml'

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'activate/supabase-production'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Obter branch de ativação
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: activate/supabase-production
          fetch-depth: 0

      - name: Aplicar correções WCAG
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const cssPath = 'styles.css';
          let css = fs.readFileSync(cssPath, 'utf8');
          const oldBadge = `.bell-badge {\n    position: absolute;\n    top: 4px;\n    right: 4px;\n    background-color: var(--danger);\n    color: white;`;
          const newBadge = `.bell-badge {\n    position: absolute;\n    top: 4px;\n    right: 4px;\n    background-color: #b91c1c;\n    color: white;`;
          if (!css.includes(oldBadge)) throw new Error('Bloco esperado do contador de alertas não encontrado.');
          css = css.replace(oldBadge, newBadge);
          fs.writeFileSync(cssPath, css);

          const htmlPath = 'index.html';
          let html = fs.readFileSync(htmlPath, 'utf8');
          const oldSelect = '<select class="exercise-selector" id="exercise-select" onchange="changeExercise(this.value)">';
          const newSelect = '<select class="exercise-selector" id="exercise-select" aria-label="Selecionar exercício" onchange="changeExercise(this.value)">';
          if (!html.includes(oldSelect)) throw new Error('Seletor de exercício esperado não encontrado.');
          html = html.replace(oldSelect, newSelect);
          fs.writeFileSync(htmlPath, html);
          NODE

      - name: Confirmar alterações focais
        run: |
          grep -F 'background-color: #b91c1c;' styles.css
          grep -F 'id="exercise-select" aria-label="Selecionar exercício"' index.html

      - name: Publicar correção
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add styles.css index.html
          git commit -m 'fix(a11y): improve alert contrast and label exercise selector'
          git push origin HEAD:activate/supabase-production
