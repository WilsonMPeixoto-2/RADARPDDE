name: Aplicar e validar Task 8

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  aplicar-e-validar:
    if: github.head_ref == 'feature/ciclo-a-task-8-separacao-indicadores'
    runs-on: ubuntu-latest
    steps:
      - name: Obter branch completa
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/ciclo-a-task-8-separacao-indicadores

      - name: Detectar patch temporário
        id: patch
        shell: bash
        run: |
          if [ -f task8-implementation.patch.gz.b64 ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Aplicar commits validados
        id: apply
        if: steps.patch.outputs.present == 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -uo pipefail
          exec > >(tee /tmp/task8-diagnostic.txt) 2>&1
          echo "== arquivo base64 =="
          wc -c task8-implementation.patch.gz.b64
          base64 --decode task8-implementation.patch.gz.b64 > /tmp/task8-implementation.patch.gz
          decode_status=$?
          echo "base64_status=$decode_status"
          if [ "$decode_status" -ne 0 ]; then exit "$decode_status"; fi
          echo "== arquivo gzip =="
          wc -c /tmp/task8-implementation.patch.gz
          gzip --test /tmp/task8-implementation.patch.gz
          gzip_status=$?
          echo "gzip_status=$gzip_status"
          if [ "$gzip_status" -ne 0 ]; then exit "$gzip_status"; fi
          gzip --decompress --stdout /tmp/task8-implementation.patch.gz > /tmp/task8-implementation.patch
          echo "== patch descompactado =="
          wc -c /tmp/task8-implementation.patch
          sha256sum /tmp/task8-implementation.patch
          sed -n '1,12p' /tmp/task8-implementation.patch
          git config user.name "Wilson Malafaia Peixoto"
          git config user.email "wilsonmp2@gmail.com"
          echo "== git am =="
          git am --3way /tmp/task8-implementation.patch
          am_status=$?
          echo "git_am_status=$am_status"
          if [ "$am_status" -ne 0 ]; then
            git status --short
            git am --show-current-patch=diff || true
            exit "$am_status"
          fi
          git rm task8-implementation.patch.gz.b64

      - name: Publicar diagnóstico do transporte
        if: always() && steps.patch.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: task8-patch-diagnostic
          path: /tmp/task8-diagnostic.txt
          retention-days: 1

      - name: Interromper após falha de aplicação
        if: steps.patch.outputs.present == 'true' && steps.apply.outcome != 'success'
        run: exit 1

      - name: Instalar dependências sem alterar o manifesto
        if: steps.patch.outputs.present != 'true' || steps.apply.outcome == 'success'
        run: npm install --no-package-lock

      - name: Instalar navegadores Playwright
        if: steps.patch.outputs.present != 'true' || steps.apply.outcome == 'success'
        run: npx playwright install --with-deps

      - name: Verificar sintaxe
        if: steps.patch.outputs.present != 'true' || steps.apply.outcome == 'success'
        run: |
          node --check app.js
          node --check src/domain/fluxo-operacional.js
          node --check tests/e2e/functional-core.spec.js
          node --check tests/e2e/pendency-cycle.spec.js
          node --check tests/e2e/task-8-indicator-separation.spec.js

      - name: Executar testes unitários
        if: steps.patch.outputs.present != 'true' || steps.apply.outcome == 'success'
        run: node --test tests/*.test.js

      - name: Executar Playwright completo
        if: steps.patch.outputs.present != 'true' || steps.apply.outcome == 'success'
        run: npm run test:e2e

      - name: Confirmar escopo da Task 8
        if: steps.patch.outputs.present != 'true' || steps.apply.outcome == 'success'
        shell: bash
        run: |
          ! grep -R -n "getProgramOperationalStatus\|getProgramVerificationStatus\|getProgramStatusMeta" app.js src tests
          ! grep -nE "analise.*inapta|Incorreto.*inapta|pAtivasComp.*inapta|pendencias.*return 'inapta'" app.js src/domain/fluxo-operacional.js
          git diff --check origin/main...HEAD

      - name: Publicar commits aprovados na branch
        if: steps.patch.outputs.present == 'true' && steps.apply.outcome == 'success'
        shell: bash
        run: |
          git commit -m "chore: remover patch temporário da task 8"
          git push origin HEAD:feature/ciclo-a-task-8-separacao-indicadores

      - name: Publicar relatório Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-task-8
          path: playwright-report/
          retention-days: 7
