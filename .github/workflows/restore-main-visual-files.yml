name: Restaurar arquivos visuais da main

on:
  pull_request:
    paths:
      - '.github/workflows/restore-main-visual-files.yml'

permissions:
  contents: write

jobs:
  restore:
    if: github.head_ref == 'activate/supabase-production'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Obter branch de ativação e main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: activate/supabase-production
          fetch-depth: 0

      - name: Preservar exatamente os arquivos visuais atuais da main
        run: |
          git fetch origin main
          git checkout origin/main -- src/integration/mobile-navigation.js styles.css
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/integration/mobile-navigation.js styles.css
          if git diff --cached --quiet; then
            echo 'Os arquivos visuais já coincidem com a main.'
            exit 0
          fi
          git commit -m 'chore: preserve latest visual implementation from main'
          git push origin HEAD:activate/supabase-production
