name: Fix safeupdate import promotion

on:
  pull_request:
    paths:
      - '.github/workflows/fix-safeupdate-import-promotion.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: feature/supabase-readiness

      - name: Configure Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Apply safeupdate-compatible replacement
        run: node .github/apply-safe-delete-fix.mjs

      - name: Validate focused and complete readiness
        run: |
          npm ci
          node --test tests/unit/reversible-import-safe-delete.test.js
          CI=false npm run test:readiness

      - name: Commit one verified correction
        shell: bash
        run: |
          set -euo pipefail
          git add supabase/migrations/20260714220146_preconnection_reversible_import.sql tests/unit/reversible-import-safe-delete.test.js
          git rm -f .github/apply-safe-delete-fix.mjs .github/workflows/fix-safeupdate-import-promotion.yml
          git config user.name 'RADAR Gate Automation'
          git config user.email 'actions@users.noreply.github.com'
          git commit -m 'fix: tornar promocao compativel com safeupdate'
          git push origin HEAD:feature/supabase-readiness
