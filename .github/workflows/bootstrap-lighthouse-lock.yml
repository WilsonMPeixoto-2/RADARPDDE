name: Bootstrap Lighthouse lockfile

on:
  pull_request:
    paths:
      - package.json
      - package-lock.json
      - lighthouserc.cjs
      - .github/workflows/bootstrap-lighthouse-lock.yml

permissions:
  contents: read

jobs:
  lockfile:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Obter código
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm

      - name: Registrar Lighthouse no manifesto
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.scripts['test:lighthouse'] = 'lhci autorun --config=./lighthouserc.cjs';
          pkg.devDependencies['@lhci/cli'] = '0.15.1';
          pkg.devDependencies = Object.fromEntries(
            Object.entries(pkg.devDependencies).sort(([left], [right]) => left.localeCompare(right))
          );
          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

      - name: Atualizar lockfile reproduzível
        run: npm install --package-lock-only --ignore-scripts

      - name: Instalar e validar dependências
        run: npm ci --ignore-scripts

      - name: Bloquear vulnerabilidades altas ou críticas
        run: npm audit --audit-level=high

      - name: Publicar manifesto e lockfile
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: lighthouse-package-${{ github.run_id }}
          path: |
            package.json
            package-lock.json
          retention-days: 1
          if-no-files-found: error
