name: Sincronizar artefatos gerados

on:
  pull_request:
    paths:
      - '.github/workflows/sync-generated-artifacts.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'supabase/**'
      - 'src/vendor/**'

permissions:
  contents: write

env:
  SUPABASE_TELEMETRY_DISABLED: '1'

jobs:
  sync:
    if: github.head_ref == 'activate/supabase-production'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Obter branch de ativação
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: activate/supabase-production
          fetch-depth: 0

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Iniciar Supabase local e recriar banco
        run: |
          npm run supabase:start
          npm run supabase:reset

      - name: Regenerar tipos e bundles fixados
        run: |
          mkdir -p src/types
          npm run supabase:gen:types
          npm run build:supabase-client
          npm run build:ajv
          npm run typecheck:database

      - name: Publicar artefatos sincronizados
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet -- src/types/database.types.ts vendor/supabase-client.js vendor/ajv.js; then
            echo 'Artefatos já estavam sincronizados.'
            exit 0
          fi
          git add src/types/database.types.ts vendor/supabase-client.js vendor/ajv.js
          git commit -m 'build: synchronize generated Supabase artifacts'
          git push origin HEAD:activate/supabase-production

      - name: Encerrar Supabase local
        if: ${{ always() }}
        run: npm run supabase:stop || true
