name: Export branch snapshot

on:
  pull_request:
    paths:
      - '.github/workflows/export-branch-snapshot.yml'
  push:
    branches:
      - feature/supabase-readiness
    paths:
      - '.github/workflows/export-branch-snapshot.yml'

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Exportar snapshot efêmero
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: radar-branch-snapshot
          path: .
          include-hidden-files: true
          retention-days: 1
