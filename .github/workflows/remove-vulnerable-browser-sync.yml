name: Remover browser-sync vulnerável

on:
  pull_request:
    paths:
      - '.github/workflows/remove-vulnerable-browser-sync.yml'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

jobs:
  update-dependencies:
    if: github.head_ref == 'activate/supabase-production'
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Obter branch de ativação
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: activate/supabase-production
          fetch-depth: 0

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm

      - name: Remover dependência vulnerável e atualizar lockfile
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          packageJson.scripts.dev = 'http-server . -p 4175 -c-1';
          delete packageJson.devDependencies['browser-sync'];
          fs.writeFileSync('package.json', `${JSON.stringify(packageJson, null, 2)}\n`);
          NODE
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          npm ci

      - name: Confirmar ausência de vulnerabilidades altas ou críticas
        run: |
          npm audit --json > /tmp/npm-audit.json || true
          node <<'NODE'
          const fs = require('node:fs');
          const report = JSON.parse(fs.readFileSync('/tmp/npm-audit.json', 'utf8'));
          const counts = report.metadata?.vulnerabilities || {};
          const high = Number(counts.high || 0);
          const critical = Number(counts.critical || 0);
          console.log(`Vulnerabilidades: moderate=${Number(counts.moderate || 0)}, high=${high}, critical=${critical}`);
          if (high > 0 || critical > 0) process.exit(1);
          NODE

      - name: Publicar atualização reproduzível
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo 'Dependências já estavam atualizadas.'
            exit 0
          fi
          git commit -m 'security: remove vulnerable browser-sync dependency'
          git push origin HEAD:activate/supabase-production
