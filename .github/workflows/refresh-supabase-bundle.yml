name: Atualizar bundle Supabase

on:
  push:
    branches:
      - feature/supabase-readiness
    paths:
      - '.github/workflows/refresh-supabase-bundle.yml'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/supabase-readiness
          fetch-depth: 0

      - name: Configurar Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Regenerar bundle
        run: npm run build:supabase-client

      - name: Commitar bundle atualizado
        run: |
          if git diff --quiet -- vendor/supabase-client.js; then
            echo 'Bundle já estava atualizado.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add vendor/supabase-client.js
          git commit -m 'build: atualizar bundle Supabase fixado'
          git push origin HEAD:feature/supabase-readiness
