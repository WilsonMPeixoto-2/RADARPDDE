name: Gerar artefatos Supabase

on:
  push:
    branches:
      - feature/supabase-readiness
    paths:
      - '.github/workflows/generate-supabase-artifacts.yml'

permissions:
  contents: write

env:
  SUPABASE_TELEMETRY_DISABLED: '1'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout da branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/supabase-readiness
          fetch-depth: 0

      - name: Configurar Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Iniciar Supabase local
        run: npm run supabase:start

      - name: Recriar banco com migrations
        run: npm run supabase:reset

      - name: Executar testes pgTAP
        run: npm run supabase:test:db

      - name: Gerar tipos do banco
        run: npm run supabase:gen:types

      - name: Empacotar cliente Supabase
        run: npm run build:supabase-client

      - name: Substituir CDN flutuante pelo bundle fixado
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = '<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>'
          new = '<script src="vendor/supabase-client.js"></script>'
          if old not in text and new not in text:
              raise SystemExit('Referência do cliente Supabase não localizada em index.html')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Commitar artefatos gerados
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html src/types/database.types.ts vendor/supabase-client.js
          if git diff --cached --quiet; then
            echo 'Artefatos já estavam atualizados.'
            exit 0
          fi
          git commit -m 'build: versionar tipos e cliente Supabase'
          git push origin HEAD:feature/supabase-readiness

      - name: Encerrar Supabase local
        if: always()
        run: npm run supabase:stop || true
