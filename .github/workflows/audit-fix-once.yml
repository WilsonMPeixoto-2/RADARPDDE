name: Aplicar correções auditadas uma vez

on:
  push:
    branches:
      - fix/ciclo-a-tasks-1-7-auditoria
  pull_request:
    branches:
      - main
    types:
      - opened

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: ${{ (github.event_name == 'push' && !contains(github.event.head_commit.message, '[audit-fix]')) || (github.event_name == 'pull_request' && github.event.action == 'opened') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Obter código
        uses: actions/checkout@v4
        with:
          ref: fix/ciclo-a-tasks-1-7-auditoria
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm install --no-package-lock

      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium webkit

      - name: Criar testes de regressão antes das correções
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          unit_path = Path('tests/pendencias.test.js')
          unit = unit_path.read_text()
          marker = "test('numera novo envio a partir do maior número legado existente'"
          if marker not in unit:
              unit += r'''

          test('numera novo envio a partir do maior número legado existente', () => {
              const source = createOpenPendencyFixture();
              source.tentativas = [
                  { id: 'tentativa-1', numero: 1, status: 'analisada' },
                  { id: 'tentativa-3', numero: 3, status: 'analisada' }
              ];

              const result = registerCorrectiveSubmission(source, {
                  id: 'tentativa-4',
                  dataDisponibilizacao: '2026-07-18',
                  observacao: 'Nova versão disponível.'
              }, {
                  eventId: 'evt-envio-4',
                  at: '2026-07-18T12:00:00.000Z',
                  usuario: 'Operador de teste',
                  perfil: 'controlador'
              });

              assert.equal(result.tentativas.at(-1).numero, 4);
          });

          test('marca contexto documental estruturado parcial como incompleto', () => {
              const result = normalizePendencyRecord({
                  id: 'pendencia-legada-parcial',
                  programaId: 'BASIC',
                  documentoKey: 'extCC',
                  status: 'Aberta',
                  motivo: 'Documento ausente'
              });

              assert.equal(result.tipo, 'documental');
              assert.equal(result.contextoIncompleto, true);
          });
          '''
              unit_path.write_text(unit)

          e2e_path = Path('tests/e2e/pendency-cycle.spec.js')
          e2e = e2e_path.read_text()
          e2e_marker = "não pré-seleciona Documento ausente ao classificar um arquivo como Incorreto"
          if e2e_marker not in e2e:
              e2e += r'''

          test.describe('abertura automática de pendência documental', () => {
            test('não pré-seleciona Documento ausente ao classificar um arquivo como Incorreto', async ({ page }, testInfo) => {
              test.skip(testInfo.project.name !== 'desktop-chromium', 'Cenário exclusivo do projeto desktop.');

              await page.goto('/');
              await page.evaluate(target => {
                switchProfile('controlador');
                const competencia = activeCompetenciaKey;
                const escola = escolas.find(candidate => (
                  Array.isArray(candidate.programasIds)
                  && candidate.programasIds.includes(target.programaId)
                  && isCompetenceInScope(candidate.competenciaInicial, competencia)
                ));
                if (!escola) throw new Error('Escola determinística não encontrada.');

                const compProgKey = competencia + '_' + target.programaId;
                verificacoes[escola.id] = verificacoes[escola.id] || {};
                verificacoes[escola.id][compProgKey] = RadarFluxoOperacional.createEmptyVerification();
                verificacoes[escola.id][compProgKey].bonificacao[target.documentoKey] = 'Sim';
                persist();
                activeProntuarioCompetencia = competencia;
                switchView('prontuario', escola.id);
                changeAnaliseTecnica(escola.id, compProgKey, target.documentoKey, 'Incorreto');
              }, DOCUMENT_CONTEXT);

              const modal = page.locator('#modal-nova-pendencia');
              await expect(modal).toHaveClass(/show/);
              await expect(modal.locator('input[name="pend-erros"]:checked')).toHaveCount(0);
              await expect(modal.getByLabel('Documento ausente', { exact: true })).not.toBeChecked();
            });
          });
          '''
              e2e_path.write_text(e2e)
          PY

      - name: Confirmar que os testes reproduzem os defeitos
        shell: bash
        run: |
          set +e
          node --test tests/pendencias.test.js > /tmp/red-unit.log 2>&1
          UNIT_STATUS=$?
          npx playwright test tests/e2e/pendency-cycle.spec.js --project=desktop-chromium --grep "não pré-seleciona Documento ausente" > /tmp/red-e2e.log 2>&1
          E2E_STATUS=$?
          set -e
          cat /tmp/red-unit.log
          cat /tmp/red-e2e.log
          if [ "$UNIT_STATUS" -eq 0 ] || [ "$E2E_STATUS" -eq 0 ]; then
            echo "Os testes de regressão deveriam falhar antes das correções."
            exit 1
          fi

      - name: Aplicar correções mínimas
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          domain_path = Path('src/domain/pendencias.js')
          domain = domain_path.read_text()
          old_context = "        next.contextoIncompleto = !documentary;"
          new_context = "        next.contextoIncompleto = !hasCompleteStructuredContext(source);"
          if domain.count(old_context) != 1:
              raise SystemExit('Trecho de contextoIncompleto não encontrado de forma única.')
          domain = domain.replace(old_context, new_context)

          old_number = "            numero: next.tentativas.length + 1,"
          new_number = "            numero: getNextAttemptNumber(next.tentativas),"
          if domain.count(old_number) != 1:
              raise SystemExit('Trecho de numeração de tentativa não encontrado de forma única.')
          domain = domain.replace(old_number, new_number)
          domain_path.write_text(domain)

          app_path = Path('app.js')
          app = app_path.read_text()
          old_default = r'''        // Auto seleção de um erro documental compatível com o contexto detectado.
          const defaultError = docKey === 'declBBAgil'
              ? 'Sem assinatura'
              : 'Documento ausente';
          const defaultErrorInput = Array.from(document.querySelectorAll('input[name="pend-erros"]'))
              .find(input => input.value === defaultError);
          if (defaultErrorInput) {
              defaultErrorInput.checked = true;
              syncAbsentErrorExclusivity(defaultErrorInput);
          }
          '''
          new_default = r'''        // Ao abrir a pendência a partir de uma análise "Incorreto",
          // nenhum erro é presumido: o Controlador registra apenas as falhas efetivamente observadas.
          '''
          if app.count(old_default) != 1:
              raise SystemExit('Trecho de pré-seleção de erro não encontrado de forma única.')
          app = app.replace(old_default, new_default)
          app_path.write_text(app)

          workflow_path = Path('.github/workflows/playwright-mobile.yml')
          workflow = workflow_path.read_text()
          replacements = {
              'name: Testes mobile Playwright': 'name: Testes E2E Playwright',
              '    name: Android e iPhone': '    name: Desktop, Android e iPhone',
              '    timeout-minutes: 20': '    timeout-minutes: 35',
              '      - name: Executar testes mobile\n        run: npm run test:mobile': '      - name: Executar testes E2E completos\n        run: npm run test:e2e'
          }
          for old, new in replacements.items():
              if old not in workflow:
                  raise SystemExit(f'Trecho do workflow não encontrado: {old!r}')
              workflow = workflow.replace(old, new)
          workflow_path.write_text(workflow)
          PY

      - name: Validar correções
        run: |
          node --check app.js
          node --test tests/*.test.js
          npm run test:e2e

      - name: Confirmar escopo e publicar commit
        shell: bash
        run: |
          git diff --check
          if git diff -- app.js | grep -E "currentProfile|perfil"; then
            echo "A correção alterou regras de perfil, o que foi proibido."
            exit 1
          fi
          rm .github/workflows/audit-fix-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js src/domain/pendencias.js tests/pendencias.test.js tests/e2e/pendency-cycle.spec.js .github/workflows/playwright-mobile.yml .github/workflows/audit-fix-once.yml
          git commit -m "fix: consolidar correções auditadas das tasks 1 a 7 [audit-fix]"
          git push origin HEAD:fix/ciclo-a-tasks-1-7-auditoria
