name: Gerar package-lock temporário

on:
  push:
    branches:
      - feature/supabase-readiness
    paths:
      - 'package.json'
      - '.github/workflows/commit-package-lock.yml'

permissions:
  contents: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' }}

    steps:
      - name: Obter branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: feature/supabase-readiness

      - name: Configurar Node.js LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'

      - name: Gerar lockfile
        run: npm install --package-lock-only --ignore-scripts

      - name: Versionar lockfile quando necessário
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json && git ls-files --error-unmatch package-lock.json >/dev/null 2>&1; then
            echo 'package-lock.json já está atualizado.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json
          git commit -m 'chore: versionar dependências reproduzíveis'
          git push origin HEAD:feature/supabase-readiness
