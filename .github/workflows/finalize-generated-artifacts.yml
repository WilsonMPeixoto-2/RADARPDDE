name: Finalize generated artifacts

on:
  push:
    branches:
      - agent/pr22-finalization
    paths:
      - '.github/workflows/finalize-generated-artifacts.yml'

permissions:
  contents: write

env:
  SUPABASE_TELEMETRY_DISABLED: '1'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout finalization branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/pr22-finalization
          fetch-depth: 2

      - name: Configure Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install reproducible dependencies
        run: npm ci

      - name: Start local Supabase
        run: npm run supabase:start

      - name: Recreate database and regenerate artifacts
        run: |
          set -euo pipefail
          npm run supabase:reset
          mkdir -p src/types
          npm run supabase:gen:types
          npm run build:supabase-client
          npm run build:ajv
          npm run typecheck:database
          CI=false npm run check:generated

      - name: Commit deterministic artifacts and remove temporary workflows
        shell: bash
        run: |
          set -euo pipefail
          git add src/types/database.types.ts vendor/supabase-client.js vendor/ajv.js
          git rm -f .github/workflows/export-current-branch.yml .github/workflows/finalize-generated-artifacts.yml
          git config user.name 'RADAR Gate Automation'
          git config user.email 'actions@users.noreply.github.com'
          git commit -m 'build: sincronizar artefatos gerados do gate final'
          git push origin HEAD:agent/pr22-finalization

      - name: Stop local Supabase
        if: always()
        run: npm run supabase:stop || true
