name: Diagnóstico pgTAP Supabase

on:
  pull_request:
    paths:
      - '.github/workflows/supabase-pgtap-diagnostic.yml'

permissions:
  contents: read

env:
  SUPABASE_TELEMETRY_DISABLED: '1'

jobs:
  diagnose-pgtap:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Iniciar e recriar Supabase local
        run: |
          npm run supabase:start
          npm run supabase:reset

      - name: Executar pgTAP com log integral
        id: pgtap
        shell: bash
        run: |
          set +e
          npm run supabase:test:db > pgtap-diagnostic.log 2>&1
          status=$?
          cat pgtap-diagnostic.log
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publicar log integral
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pgtap-diagnostic-${{ github.run_id }}
          path: pgtap-diagnostic.log
          if-no-files-found: error
          retention-days: 1

      - name: Encerrar Supabase local
        if: always()
        run: npm run supabase:stop || true

      - name: Reprovar após preservar o diagnóstico
        if: steps.pgtap.outputs.status != '0'
        run: exit 1
