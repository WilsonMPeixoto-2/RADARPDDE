name: Homologar Preview Supabase remoto
# Disparo final após registro do workflow na branch padrão.

on:
  workflow_dispatch:
  push:
    branches:
      - qa/supabase-preview-final
    paths:
      - 'scripts/ops/prepare-remote-homologation-users.mjs'
      - 'scripts/ops/cleanup-remote-homologation-users.mjs'
      - 'tests/e2e/supabase-preview-remote.spec.js'
      - 'playwright.supabase-preview.config.js'
      - '.github/workflows/homologacao-supabase-preview-remoto.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'scripts/ops/prepare-remote-homologation-users.mjs'
      - 'scripts/ops/cleanup-remote-homologation-users.mjs'
      - 'tests/e2e/supabase-preview-remote.spec.js'
      - 'playwright.supabase-preview.config.js'
      - '.github/workflows/homologacao-supabase-preview-remoto.yml'

permissions:
  contents: read

concurrency:
  group: homologacao-supabase-preview-remoto
  cancel-in-progress: false

env:
  RADAR_DEPLOYMENT_URL: https://radarpdde-d5g8j0esm-wilson-m-peixotos-projects.vercel.app
  RADAR_SUPABASE_URL: ${{ secrets.RADAR_SUPABASE_URL }}
  RADAR_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RADAR_SUPABASE_SERVICE_ROLE_KEY }}
  RADAR_ALLOW_REMOTE_HOMOLOGATION: 'true'
  RADAR_E2E_SUPABASE_REMOTE: '1'
  RADAR_HML_FIXTURE_FILE: ${{ runner.temp }}/radar-hml-users.json

jobs:
  homologar:
    name: Auth, perfis, RLS e persistência no Preview
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Obter código
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm

      - name: Instalar dependências reproduzíveis
        run: npm ci

      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium

      - name: Validar alvo, segredos e manifesto público
        shell: bash
        run: |
          set -euo pipefail
          test -n "${RADAR_SUPABASE_URL}"
          test -n "${RADAR_SUPABASE_SERVICE_ROLE_KEY}"
          test "${RADAR_SUPABASE_URL}" = 'https://scnryinorqeucbfkioxo.supabase.co'
          node --input-type=module <<'NODE'
          const response = await fetch(`${process.env.RADAR_DEPLOYMENT_URL}/config.runtime.js`);
          if (!response.ok) throw new Error(`Manifesto indisponível: ${response.status}`);
          const source = await response.text();
          if (!source.includes('"environment": "preview"')) throw new Error('Preview sem environment=preview.');
          if (!source.includes('"dataMode": "supabase-preview"')) throw new Error('Preview sem dataMode=supabase-preview.');
          if (!source.includes('"supabaseRepositoryEnabled": true')) throw new Error('Repositório Supabase desativado no Preview.');
          if (!source.includes('"productionActivationApproved": false')) throw new Error('Preview com ativação de Production indevida.');
          process.stdout.write('Manifesto Preview validado sem exibir credenciais.\n');
          NODE

      - name: Gerar credencial efêmera protegida
        shell: bash
        run: |
          set -euo pipefail
          password="$(node --input-type=module -e "import { randomBytes } from 'node:crypto'; process.stdout.write(randomBytes(36).toString('base64url') + 'A1!')")"
          echo "::add-mask::${password}"
          echo "RADAR_HML_PASSWORD=${password}" >> "${GITHUB_ENV}"
          echo "RADAR_HML_RUN_ID=${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "${GITHUB_ENV}"

      - name: Criar identidades temporárias e perfis funcionais
        run: node scripts/ops/prepare-remote-homologation-users.mjs

      - name: Homologar login, sessão, telas, permissões e operações HML
        run: >-
          npx playwright test
          tests/e2e/supabase-preview-remote.spec.js
          --config=playwright.supabase-preview.config.js

      - name: Remover identidades e registros temporários
        if: always()
        run: node scripts/ops/cleanup-remote-homologation-users.mjs

      - name: Publicar evidências da homologação
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: homologacao-supabase-preview-${{ github.run_id }}
          path: |
            playwright-report-supabase-preview/
            test-results/
          if-no-files-found: warn
          retention-days: 14
