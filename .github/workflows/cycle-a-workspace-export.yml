name: Cycle A finalizer

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/cycle-a-workspace-export.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Configure Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Stage removal of temporary execution artifacts
        shell: bash
        run: |
          set -euo pipefail
          git rm -f \
            .github/workflows/cycle-a-workspace-export.yml \
            .cycle-a-patch/part-00 \
            .cycle-a-patch-b64/part-00

      - name: Regenerate clean repository inventory
        run: npm run audit:inventory

      - name: Validate Cycle A artifacts
        run: npm run audit:cycle-a

      - name: Run structural and functional gates
        shell: bash
        run: |
          set -euo pipefail
          npm run check
          npm run test:unit
          npm run test:integration
          npm run audit:functional
          npm run test:readiness
          npm audit --audit-level=high
          git diff --check

      - name: Prove absence of functional product changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff origin/main --name-only | grep -E '^(app\.js|index\.html|styles\.css|config\.js|config\.runtime\.js|src/|supabase/|vercel\.json|\.github/workflows/)'; then
            echo 'Arquivo funcional alterado no Ciclo A.' >&2
            exit 1
          fi
          if git grep -n -E '\b(TBD|TODO)\b|implement later|fill in details|melhorar UX|modernizar o sistema' -- \
            docs/reference docs/audits docs/handoff \
            docs/superpowers/specs/2026-07-15-contratos-transversais-experiencia-design.md; then
            echo 'Placeholder ou texto vago encontrado.' >&2
            exit 1
          fi

      - name: Commit clean final state to PR branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'docs: concluir linha de base global do RADAR'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
