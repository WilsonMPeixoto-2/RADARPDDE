name: Diagnóstico pgTAP da ativação

on:
  pull_request:
    paths:
      - 'supabase/**'
      - '.github/workflows/diagnostico-pgtap-ativacao.yml'

permissions:
  contents: read

env:
  SUPABASE_TELEMETRY_DISABLED: '1'

jobs:
  diagnostico:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm
      - name: Instalar dependências
        run: npm ci
      - name: Iniciar Supabase local
        run: npm run supabase:start
      - name: Recriar banco local
        run: npm run supabase:reset
      - name: Capturar resultado pgTAP
        id: pgtap
        shell: bash
        run: |
          set +e
          npm run supabase:test:db > pgtap.log 2>&1
          status=$?
          cat pgtap.log
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          exit 0
      - name: Publicar diagnóstico pgTAP
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: diagnostico-pgtap-ativacao-${{ github.run_id }}
          path: pgtap.log
          if-no-files-found: error
          retention-days: 1
      - name: Reproduzir status do pgTAP
        run: exit "${{ steps.pgtap.outputs.status }}"
      - name: Encerrar Supabase local
        if: always()
        run: npm run supabase:stop || true
