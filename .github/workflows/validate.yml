name: Validar RADAR PDDE

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Sintaxe, auditoria e testes de domínio
    runs-on: ubuntu-latest

    steps:
      - name: Obter código
        uses: actions/checkout@v4

      - name: Configurar Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package.json

      - name: Instalar dependências de desenvolvimento
        run: npm install

      - name: Verificar sintaxe da aplicação e infraestrutura
        run: npm run check

      - name: Executar testes unitários de domínio e persistência
        run: |
          node --test tests/*.test.js
          npm run test:unit

      - name: Auditar cobertura funcional e de persistência
        run: npm run audit:functional
