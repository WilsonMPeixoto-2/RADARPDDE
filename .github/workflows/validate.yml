name: Validar RADAR PDDE

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    name: Sintaxe, domínio e consolidação da Task 9
    runs-on: ubuntu-latest

    steps:
      - name: Obter código
        uses: actions/checkout@v4
        with:
          ref: feature/ciclo-a-task-9-pendencias-navegaveis
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verificar sintaxe da aplicação e módulos ativos
        run: |
          node --check app.js
          node --check src/domain/pendencias-view-model.js
          node --check src/integration/task-9-pendencias-page.js
          node --check src/integration/task-9-focus-bridge.js
          node --check src/integration/task-9-cross-view.js

      - name: Executar testes unitários
        run: node --test tests/*.test.js

      - name: Consolidar expectativas das quatro filas
        if: github.actor != 'github-actions[bot]'
        run: |
          git show 5f5f9959bb5b53397cdc1337de894e093fca1b1e:tests/e2e/pendency-cycle.spec.js > tests/e2e/pendency-cycle.spec.js
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/e2e/pendency-cycle.spec.js')
          text = path.read_text(encoding='utf-8')
          replacements = [
              (
                  "    await expect(page.getByRole('tab', { name: /^Abertas\\b/ })).toBeVisible();\n"
                  "    const awaitingRow = page.locator('#p-abertas tr[data-pendency-ref]');\n"
                  "    await expect(awaitingRow).toContainText('Aguardando reanálise');",
                  "    await expect(page.getByRole('tab', { name: /^Aguardando reanálise\\b/ }))\n"
                  "      .toHaveAttribute('aria-selected', 'true');\n"
                  "    const awaitingRow = page.locator('#p-aguardando tr[data-pendency-ref]');\n"
                  "    await expect(awaitingRow).toContainText('Aguardando reanálise');"
              ),
              (
                  "    await expect(page.getByRole('tab', { name: /^Abertas\\b/ }))\n"
                  "      .toHaveClass(/active/);\n"
                  "    await expect(page.locator('#p-abertas')).toHaveClass(/active/);",
                  "    await expect(page.getByRole('tab', { name: /^Aguardando reanálise\\b/ }))\n"
                  "      .toHaveClass(/active/);\n"
                  "    await expect(page.locator('#p-aguardando')).toHaveClass(/active/);"
              ),
              (
                  "inActiveTab: Boolean(focused && focused.closest('#p-abertas'))",
                  "inActiveTab: Boolean(focused && focused.closest('#p-aguardando'))"
              ),
              (
                  "    await page.locator('#p-abertas').getByRole('button', {\n"
                  "      name: 'Reanalisar',\n"
                  "      exact: true\n"
                  "    }).click();",
                  "    await page.getByRole('tab', { name: /^Aguardando reanálise\\b/ }).click();\n"
                  "    await page.locator('#p-aguardando').getByRole('button', {\n"
                  "      name: 'Reanalisar',\n"
                  "      exact: true\n"
                  "    }).click();"
              )
          ]
          for old, new in replacements:
              count = text.count(old)
              print({'trecho': old.splitlines()[0], 'quantidade': count})
              if count != 1:
                  raise SystemExit(f'Trecho esperado uma vez, encontrado {count}.')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

          test "$(wc -c < tests/e2e/pendency-cycle.spec.js)" -gt 100000
          node --check tests/e2e/pendency-cycle.spec.js
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/pendency-cycle.spec.js
          git commit -m "test: consolidar filas canônicas da Task 9"
          git push origin HEAD:feature/ciclo-a-task-9-pendencias-navegaveis
