name: Validar RADAR PDDE

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Sintaxe, auditoria e testes de domínio
    runs-on: ubuntu-latest

    steps:
      - name: Obter código
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configurar Node.js LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package.json

      - name: Instalar dependências de desenvolvimento
        run: npm install

      - name: Publicar lockfile gerado
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: package-lock-candidate
          path: package-lock.json
          retention-days: 7
          if-no-files-found: error

      - name: Auditar dependências npm
        run: npm audit --audit-level=high

      - name: Verificar sintaxe da aplicação e infraestrutura
        run: npm run check

      - name: Executar testes de domínio existentes
        run: node --test tests/*.test.js

      - name: Executar testes unitários com relatório estruturado
        id: unit_tests
        shell: bash
        run: |
          set +e
          node --test --test-reporter=junit tests/unit/*.test.js > unit-tests.xml
          status=$?
          set -e
          exit $status

      - name: Publicar relatório dos testes unitários
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unit-tests-report
          path: unit-tests.xml
          retention-days: 7
          if-no-files-found: error

      - name: Gerar relatório detalhado da auditoria
        if: ${{ !cancelled() }}
        run: npm run audit:functional:json > functional-persistence-audit.json || true

      - name: Publicar relatório detalhado da auditoria
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: functional-persistence-audit
          path: functional-persistence-audit.json
          retention-days: 7
          if-no-files-found: error

      - name: Auditar cobertura funcional e de persistência
        run: npm run audit:functional
