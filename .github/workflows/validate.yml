name: Validar RADAR PDDE

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Sintaxe, auditoria e testes de domínio
    runs-on: ubuntu-latest

    steps:
      - name: Obter código
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configurar Node.js LTS
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependências reproduzíveis
        run: npm ci

      - name: Auditar dependências npm
        run: npm audit --audit-level=high

      - name: Verificar sintaxe da aplicação e infraestrutura
        run: npm run check

      - name: Executar testes de domínio existentes
        run: node --test tests/*.test.js

      - name: Executar testes de integração da migração
        run: npm run test:integration

      - name: Executar testes unitários com relatório estruturado
        id: unit_tests
        shell: bash
        run: |
          set +e
          node --test --test-reporter=junit tests/unit/*.test.js > unit-tests.xml
          status=$?
          set -e
          exit $status

      - name: Publicar relatório dos testes unitários
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-tests-report
          path: unit-tests.xml
          retention-days: 7
          if-no-files-found: error

      - name: Gerar relatório detalhado da auditoria
        if: ${{ !cancelled() }}
        run: npm run audit:functional:json > functional-persistence-audit.json || true

      - name: Publicar relatório detalhado da auditoria
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: functional-persistence-audit
          path: functional-persistence-audit.json
          retention-days: 7
          if-no-files-found: error

      - name: Auditar cobertura funcional e de persistência
        run: npm run audit:functional
