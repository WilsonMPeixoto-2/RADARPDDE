name: Validar RADAR PDDE

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Sintaxe e testes de domínio
    runs-on: ubuntu-latest

    steps:
      - name: Obter código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verificar sintaxe da aplicação
        run: node --check app.js

      - name: Executar testes unitários
        run: node --test tests/*.test.js
