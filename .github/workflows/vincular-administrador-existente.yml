name: Vincular administrador técnico existente

on:
  workflow_dispatch:
    inputs:
      admin_email:
        description: E-mail exato do usuário já criado no Supabase Auth
        required: true
        type: string
      confirmation:
        description: Digite VINCULAR_ADMINISTRADOR_TECNICO_RADAR_PDDE
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: radar-pdde-link-existing-technical-admin
  cancel-in-progress: false

env:
  RADAR_SUPABASE_URL: ${{ secrets.RADAR_SUPABASE_URL }}
  RADAR_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.RADAR_SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  vincular:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm

      - name: Instalar dependências reproduzíveis
        run: npm ci

      - name: Validar autorização explícita e segredos
        env:
          ADMIN_EMAIL: ${{ inputs.admin_email }}
          CONFIRMATION: ${{ inputs.confirmation }}
        shell: bash
        run: |
          test "${ADMIN_EMAIL}" = 'wilsonmp2@gmail.com'
          test "${CONFIRMATION}" = 'VINCULAR_ADMINISTRADOR_TECNICO_RADAR_PDDE'
          test -n "${RADAR_SUPABASE_URL}"
          test -n "${RADAR_SUPABASE_SERVICE_ROLE_KEY}"

      - name: Vincular usuário existente ao perfil técnico
        env:
          ADMIN_EMAIL: ${{ inputs.admin_email }}
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { createRequire } from 'node:module';
          import {
            TECHNICAL_ADMIN_PROFILE,
            TECHNICAL_ADMIN_SCOPE,
            findAuthUserByEmail,
            isUsableExistingAuthUser,
            upsertTechnicalAdminProfile,
            writeSanitizedBootstrapLog
          } from './scripts/lib/remote-admin-bootstrap.mjs';

          const require = createRequire(import.meta.url);
          const { createClient } = require('@supabase/supabase-js');
          const email = String(process.env.ADMIN_EMAIL || '').trim();
          const client = createClient(
            process.env.RADAR_SUPABASE_URL,
            process.env.RADAR_SUPABASE_SERVICE_ROLE_KEY,
            { auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false } }
          );

          const user = await findAuthUserByEmail(client, email);
          if (!user) throw new Error('ADMIN_USER_NOT_FOUND');
          if (!isUsableExistingAuthUser(user)) throw new Error('ADMIN_USER_NOT_USABLE');

          const profileCreated = await upsertTechnicalAdminProfile(client, user.id);
          const logCreated = await writeSanitizedBootstrapLog(client, user.id);

          const { data: rows, error } = await client
            .from('user_profiles')
            .select('profile_id, controller_id, inventory_member_id, cre_scope, active')
            .eq('user_id', user.id);
          if (error) throw new Error('ADMIN_PROFILE_RECONCILIATION_FAILED');
          if (!Array.isArray(rows) || rows.length !== 1) throw new Error('ADMIN_PROFILE_COUNT_MISMATCH');

          const row = rows[0];
          if (row.profile_id !== TECHNICAL_ADMIN_PROFILE
              || row.controller_id !== null
              || row.inventory_member_id !== null
              || row.cre_scope !== TECHNICAL_ADMIN_SCOPE
              || row.active !== true) {
            throw new Error('ADMIN_PROFILE_STATE_MISMATCH');
          }

          process.stdout.write(`${JSON.stringify({
            ok: true,
            profileId: TECHNICAL_ADMIN_PROFILE,
            scope: TECHNICAL_ADMIN_SCOPE,
            profileCreated,
            logCreated,
            active: true
          }, null, 2)}\n`);
          NODE
