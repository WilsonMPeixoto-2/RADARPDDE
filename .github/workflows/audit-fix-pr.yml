name: Executar correções auditadas no PR

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Obter branch de correção
        uses: actions/checkout@v4
        with:
          ref: fix/ciclo-a-tasks-1-7-auditoria
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm install --no-package-lock

      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium webkit

      - name: Preparar testes de regressão
        run: python3 scripts/apply_audit_fixes.py --prepare-tests

      - name: Confirmar reprodução dos defeitos
        shell: bash
        run: |
          set +e
          node --test tests/pendencias.test.js > /tmp/red-unit.log 2>&1
          UNIT_STATUS=$?
          npx playwright test tests/e2e/pendency-cycle.spec.js --project=desktop-chromium --grep "não pré-seleciona Documento ausente" > /tmp/red-e2e.log 2>&1
          E2E_STATUS=$?
          set -e
          cat /tmp/red-unit.log
          cat /tmp/red-e2e.log
          test "$UNIT_STATUS" -ne 0
          test "$E2E_STATUS" -ne 0

      - name: Aplicar correções
        run: python3 scripts/apply_audit_fixes.py --apply

      - name: Verificar sintaxe
        run: node --check app.js

      - name: Executar testes unitários
        run: node --test tests/*.test.js

      - name: Executar E2E desktop
        run: npx playwright test --project=desktop-chromium

      - name: Executar E2E Android
        run: npx playwright test --project=mobile-chromium

      - name: Executar E2E iPhone
        run: npx playwright test --project=mobile-webkit

      - name: Validar escopo
        shell: bash
        run: |
          git diff --check
          if git diff --unified=0 -- app.js \
            | grep -E '^[+-][^+-]' \
            | grep -E 'currentProfile|perfil'; then
            echo "A correção alterou regras de perfil, o que foi proibido."
            exit 1
          fi

      - name: Publicar relatório Playwright
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: audit-fix-playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Preparar commit de código e testes
        shell: bash
        run: |
          git checkout -- .github/workflows/playwright-mobile.yml
          git status --short
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js src/domain/pendencias.js tests/pendencias.test.js \
            tests/e2e/pendency-cycle.spec.js tests/e2e/functional-core.spec.js \
            playwright.config.js
          git commit -m "fix: consolidar correções auditadas das tasks 1 a 7 [audit-fix]"

      - name: Enviar commit à branch
        run: git push origin HEAD:fix/ciclo-a-tasks-1-7-auditoria
