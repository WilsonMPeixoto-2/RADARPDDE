name: Diagnóstico temporário da Edge Function

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/supabase-function-diagnostic.yml'

permissions:
  contents: read

env:
  SUPABASE_TELEMETRY_DISABLED: '1'

jobs:
  function-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm
      - name: Instalar dependências
        run: npm ci
      - name: Iniciar banco local
        run: |
          npm run supabase:start
          npm run supabase:reset
      - name: Compilar e exercer a função localmente
        shell: bash
        run: |
          set -euo pipefail
          eval "$(npx --no-install supabase status -o env | grep -E '^(ANON_KEY|API_URL)=')"
          test -n "${ANON_KEY:-}"
          test -n "${API_URL:-}"
          echo '::add-mask::'"${ANON_KEY}"

          status='000'
          for attempt in $(seq 1 90); do
            status="$(curl --silent --output function-response.json --write-out '%{http_code}' \
              --request POST \
              --header 'Content-Type: application/json' \
              --header "apikey: ${ANON_KEY}" \
              --header "Authorization: Bearer ${ANON_KEY}" \
              --data '{}' \
              "${API_URL}/functions/v1/team-account-management" || true)"
            if test "${status}" = '403'; then break; fi
            sleep 1
          done

          cat function-response.json || true
          test "${status}" = '403'
          grep -q 'PERMISSION_DENIED' function-response.json
      - name: Publicar diagnóstico
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: supabase-function-diagnostic-${{ github.run_id }}
          path: function-response.json
          if-no-files-found: warn
          retention-days: 1
      - name: Encerrar banco local
        if: always()
        run: npm run supabase:stop || true
