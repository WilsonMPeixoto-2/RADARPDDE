name: Preflight Supabase remoto

on:
  workflow_dispatch:
    inputs:
      project_ref:
        description: Referência do projeto Supabase experimental autorizado
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: supabase-remote-preflight-${{ github.ref }}
  cancel-in-progress: false

env:
  SUPABASE_TELEMETRY_DISABLED: '1'
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  PGPASS_REMOTE: ${{ secrets.SUPABASE_DB_PASSWORD }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependências reproduzíveis
        run: npm ci

      - name: Validar autorização e segredos do ambiente
        env:
          PROJECT_REF: ${{ inputs.project_ref }}
        run: |
          test -n "${SUPABASE_ACCESS_TOKEN}" || { echo 'SUPABASE_ACCESS_TOKEN ausente.' >&2; exit 1; }
          test -n "${PGPASS_REMOTE}" || { echo 'Segredo de senha do banco ausente.' >&2; exit 1; }
          test -n "${PROJECT_REF}" || { echo 'project_ref ausente.' >&2; exit 1; }

      - name: Vincular projeto experimental autorizado
        env:
          PROJECT_REF: ${{ inputs.project_ref }}
        run: npx --no-install supabase link --project-ref "${PROJECT_REF}" --password "${PGPASS_REMOTE}"

      - name: Registrar histórico local e remoto de migrations
        run: |
          set -o pipefail
          npx --no-install supabase migration list --linked --password "${PGPASS_REMOTE}" 2>&1 \
            | tee /tmp/supabase-migration-list.txt

      - name: Simular aplicação das migrations sem alterar o banco
        run: |
          set -o pipefail
          npx --no-install supabase db push --linked --dry-run --password "${PGPASS_REMOTE}" 2>&1 \
            | tee /tmp/supabase-migration-dry-run.txt

      - name: Verificar capacidades obrigatórias do projeto
        run: |
          set -o pipefail
          npx --no-install supabase db query --linked --file supabase/verification/remote-preflight.sql 2>&1 \
            | tee /tmp/supabase-capabilities.txt

      - name: Registrar branches disponíveis sem bloquear projeto sem branching
        env:
          PROJECT_REF: ${{ inputs.project_ref }}
        run: |
          if ! npx --no-install supabase branches list --project-ref "${PROJECT_REF}" --output json \
            > /tmp/supabase-branches.json; then
            printf '{"available":false,"reason":"branching indisponível ou não habilitado"}\n' \
              > /tmp/supabase-branches.json
          fi

      - name: Publicar evidências do preflight
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: supabase-remote-preflight-${{ github.run_id }}
          path: |
            /tmp/supabase-migration-list.txt
            /tmp/supabase-migration-dry-run.txt
            /tmp/supabase-capabilities.txt
            /tmp/supabase-branches.json
          if-no-files-found: warn
          retention-days: 14
