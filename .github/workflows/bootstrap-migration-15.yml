name: Bootstrap migration 15

on:
  push:
    branches:
      - supabase/performance-auth-hardening

permissions:
  contents: write

jobs:
  align:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Obter branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: supabase/performance-auth-hardening

      - name: Atualizar contratos ativos
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          function edit(path, transform, validate) {
            const original = fs.readFileSync(path, 'utf8');
            const updated = transform(original);
            if (!validate(updated)) throw new Error(`Contrato final inválido: ${path}`);
            fs.writeFileSync(path, updated);
          }

          edit('scripts/check-supabase-readiness.js', text => {
            if (!text.includes('20260720193000_performance_and_rls_hardening.sql')) {
              text = text.replace(
                /('20260720030046_activation_basic_hardening\.sql')\s*\n\]\);/,
                "$1,\n    '20260720193000_performance_and_rls_hardening.sql'\n]);"
              );
            }
            return text
              .replaceAll('APLICAR_14_MIGRATIONS_EM_AMBIENTE_DESCARTAVEL', 'APLICAR_15_MIGRATIONS_EM_AMBIENTE_DESCARTAVEL')
              .replaceAll('das 14 migrations', 'das 15 migrations');
          }, text => text.includes('20260720193000_performance_and_rls_hardening.sql')
              && text.includes('APLICAR_15_MIGRATIONS_EM_AMBIENTE_DESCARTAVEL'));

          edit('scripts/check-supabase-final-alignment.js', text => {
            if (!text.includes('20260720193000_performance_and_rls_hardening.sql')) {
              text = text.replace(
                "    'supabase/migrations/20260720030046_activation_basic_hardening.sql',",
                "    'supabase/migrations/20260720030046_activation_basic_hardening.sql',\n    'supabase/migrations/20260720193000_performance_and_rls_hardening.sql',"
              );
            }
            return text
              .replaceAll('migrationCount !== 14', 'migrationCount !== 15')
              .replaceAll('deve conter 14 migrations', 'deve conter 15 migrations');
          }, text => text.includes('20260720193000_performance_and_rls_hardening.sql')
              && text.includes('migrationCount !== 15'));

          edit('scripts/ops/build-canonical-import-sql.mjs', text => text
            .replace(/version='20260720030046'\) then raise exception 'MIGRATION_14_MISSING'/,
              "version='20260720193000') then raise exception 'MIGRATION_15_MISSING'")
            .replace(/schema_migrations\)<>14/, 'schema_migrations)<>15'),
            text => text.includes("version='20260720193000'")
              && text.includes("MIGRATION_15_MISSING")
              && text.includes('schema_migrations)<>15'));

          edit('tests/unit/readiness-check.test.js', text => {
            if (!text.includes('20260720193000_performance_and_rls_hardening.sql')) {
              text = text.replace(
                /('20260720030046_activation_basic_hardening\.sql')\s*\n\];/,
                "$1,\n    '20260720193000_performance_and_rls_hardening.sql'\n];"
              );
            }
            return text
              .replaceAll('/20260720030046_activation_basic_hardening\\.sql/', '/20260720193000_performance_and_rls_hardening\\.sql/')
              .replaceAll('atualmente **14** migrations', 'atualmente **15** migrations')
              .replaceAll("replace('**14**', '**10**')", "replace('**15**', '**10**')")
              .replaceAll('contém 14/i', 'contém 15/i')
              .replaceAll('APLICAR_14_MIGRATIONS_EM_AMBIENTE_DESCARTAVEL', 'APLICAR_15_MIGRATIONS_EM_AMBIENTE_DESCARTAVEL');
          }, text => text.includes('20260720193000_performance_and_rls_hardening.sql')
              && text.includes('atualmente **15** migrations'));

          edit('docs/runbooks/SUPABASE_CONNECTION.md', text => text
            .replaceAll('atualmente **14** migrations', 'atualmente **15** migrations')
            .replaceAll('exatamente as 14 migrations versionadas', 'exatamente as 15 migrations versionadas'),
            text => text.includes('atualmente **15** migrations')
              && text.includes('exatamente as 15 migrations versionadas'));

          edit('supabase/verification/remote-post-apply.sql', text => {
            if (!text.includes("'20260720193000'")) {
              text = text.replace(
                /('20260720030046')\s*\n\s*\];/,
                "$1,\n        '20260720193000'\n    ];"
              );
            }
            return text;
          }, text => text.includes("'20260720193000'"));
          NODE

      - name: Verificar contratos finais
        run: |
          grep -q "20260720193000_performance_and_rls_hardening.sql" scripts/check-supabase-readiness.js
          grep -q "MIGRATION_15_MISSING" scripts/ops/build-canonical-import-sql.mjs
          grep -q "20260720193000" supabase/verification/remote-post-apply.sql
          ! grep -R "APLICAR_14_MIGRATIONS_EM_AMBIENTE_DESCARTAVEL" \
            scripts tests supabase/verification docs/runbooks

      - name: Aplicar contratos pela API de conteúdo
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_BRANCH: supabase/performance-auth-hardening
        run: |
          set -euo pipefail
          files=(
            scripts/check-supabase-readiness.js
            scripts/check-supabase-final-alignment.js
            scripts/ops/build-canonical-import-sql.mjs
            tests/unit/readiness-check.test.js
            docs/runbooks/SUPABASE_CONNECTION.md
            supabase/verification/remote-post-apply.sql
          )
          for path in "${files[@]}"; do
            sha="$(gh api "/repos/${GITHUB_REPOSITORY}/contents/${path}?ref=${TARGET_BRANCH}" --jq '.sha')"
            content="$(base64 -w 0 "${path}")"
            gh api --method PUT "/repos/${GITHUB_REPOSITORY}/contents/${path}" \
              -f message="chore: alinhar ${path} à migration 15" \
              -f content="${content}" \
              -f sha="${sha}" \
              -f branch="${TARGET_BRANCH}" >/dev/null
          done
