name: Empacotar Preview direto

on:
  push:
    branches:
      - feature/supabase-readiness
    paths:
      - '.github/workflows/package-preview-source.yml'

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout do HEAD
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feature/supabase-readiness
          fetch-depth: 1

      - name: Registrar commit empacotado
        run: git rev-parse HEAD | tee PREVIEW_SOURCE_SHA.txt

      - name: Criar arquivo-fonte reproduzível
        run: |
          git archive --format=zip --output=radarpdde-preview-source.zip HEAD
          zip -j radarpdde-preview-source.zip PREVIEW_SOURCE_SHA.txt

      - name: Publicar pacote
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: radarpdde-preview-source
          path: radarpdde-preview-source.zip
          if-no-files-found: error
          retention-days: 3
