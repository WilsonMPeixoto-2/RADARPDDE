# Workflow temporário; será removido antes do merge.
name: Bootstrap Prettier

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Obter branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: chore/prettier
      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm
      - name: Registrar Prettier no manifesto
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.scripts.format = 'prettier --write --ignore-unknown';
          pkg.scripts['format:check'] = 'prettier --check --ignore-unknown';
          pkg.devDependencies.prettier = '3.9.5';
          pkg.devDependencies = Object.fromEntries(Object.entries(pkg.devDependencies).sort(([a], [b]) => a.localeCompare(b)));
          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
      - name: Atualizar lockfile
        run: npm install --package-lock-only --ignore-scripts
      - name: Instalar e validar dependências
        run: npm ci --ignore-scripts
      - name: Validar Prettier
        run: |
          npx prettier --version
          npx prettier --write package.json .prettierrc.json
          npx prettier --check package.json .prettierrc.json
      - name: Auditar dependências
        run: npm audit --audit-level=high
      - name: Aplicar manifesto e lockfile na branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for file in package.json package-lock.json; do
            sha=$(gh api "repos/$GITHUB_REPOSITORY/contents/$file?ref=chore/prettier" --jq .sha)
            content=$(base64 -w0 "$file")
            gh api --method PUT "repos/$GITHUB_REPOSITORY/contents/$file" \
              -f message="build: registrar Prettier 3.9.5" \
              -f content="$content" \
              -f sha="$sha" \
              -f branch="chore/prettier"
          done
