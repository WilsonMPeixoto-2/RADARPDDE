# Workflow temporário; será removido antes do merge.
name: Bootstrap Prettier

on:
  push:
    branches:
      - chore/prettier
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lockfile:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Obter branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: chore/prettier
      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm
      - name: Registrar Prettier no manifesto
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.scripts.format = 'prettier --write --ignore-unknown';
          pkg.scripts['format:check'] = 'prettier --check --ignore-unknown';
          pkg.devDependencies.prettier = '3.9.5';
          pkg.devDependencies = Object.fromEntries(Object.entries(pkg.devDependencies).sort(([a], [b]) => a.localeCompare(b)));
          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
      - name: Atualizar lockfile
        run: npm install --package-lock-only --ignore-scripts
      - name: Instalar dependências
        run: npm ci --ignore-scripts
      - name: Validar Prettier
        run: |
          npx prettier --version
          npx prettier --write package.json .prettierrc.json
          npx prettier --check package.json .prettierrc.json
      - name: Auditar dependências
        run: npm audit --audit-level=high
      - name: Publicar arquivos gerados
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: prettier-package
          path: |
            package.json
            package-lock.json
            .prettierrc.json
          retention-days: 1
          if-no-files-found: error
