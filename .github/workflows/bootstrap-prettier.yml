# Workflow temporário para materializar o lockfile; será removido antes do merge.
name: Bootstrap Prettier

on:
  push:
    branches:
      - chore/prettier

permissions:
  contents: write

jobs:
  lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Obter branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: chore/prettier

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          cache: npm

      - name: Registrar Prettier no manifesto
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.scripts.format = 'prettier --write --ignore-unknown';
          pkg.scripts['format:check'] = 'prettier --check --ignore-unknown';
          pkg.devDependencies.prettier = '3.9.5';
          pkg.devDependencies = Object.fromEntries(
            Object.entries(pkg.devDependencies).sort(([left], [right]) => left.localeCompare(right))
          );
          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE

      - name: Atualizar lockfile reproduzível
        run: npm install --package-lock-only --ignore-scripts

      - name: Instalar e validar dependências
        run: npm ci --ignore-scripts

      - name: Validar configuração do Prettier
        run: |
          npx prettier --version
          npx prettier --check package.json .prettierrc.json .github/dependabot.yml

      - name: Auditar dependências
        run: npm audit --audit-level=high

      - name: Commitar manifesto e lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "Manifesto e lockfile já estão atualizados."
            exit 0
          fi
          git commit -m "build: registrar Prettier 3.9.5"
          git push origin HEAD:chore/prettier
