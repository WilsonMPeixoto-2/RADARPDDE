name: Reparar package-lock

on:
  pull_request:
    paths:
      - '.github/workflows/repair-package-lock.yml'
      - 'package-lock.json'
      - 'package.json'

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'activate/supabase-production'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Obter branch de ativação
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: activate/supabase-production
          fetch-depth: 0

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'

      - name: Regenerar lockfile pelo registry público
        shell: bash
        run: |
          set -euo pipefail
          rm -f package-lock.json
          npm install \
            --package-lock-only \
            --ignore-scripts \
            --no-audit \
            --no-fund \
            --registry=https://registry.npmjs.org
          node -e "JSON.parse(require('node:fs').readFileSync('package-lock.json', 'utf8'))"
          if grep -qE '<<<<<<<|=======|>>>>>>>' package-lock.json; then
            echo 'O lockfile regenerado contém marcador de conflito.' >&2
            exit 1
          fi

      - name: Validar instalação reproduzível
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Publicar lockfile reparado
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet -- package-lock.json; then
            echo 'Nenhuma alteração necessária.'
            exit 0
          fi
          git add package-lock.json
          git commit -m 'fix: regenerate valid package-lock'
          git push origin HEAD:activate/supabase-production
