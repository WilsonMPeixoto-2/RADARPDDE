name: Reparar package-lock

on:
  pull_request:
    paths:
      - '.github/workflows/repair-package-lock.yml'
      - 'package-lock.json'

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'activate/supabase-production'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Obter branch de ativação
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: activate/supabase-production
          fetch-depth: 0

      - name: Extrair documento package-lock válido
        shell: python
        run: |
          import json
          from pathlib import Path

          path = Path('package-lock.json')
          source = path.read_text(encoding='utf-8-sig').lstrip()
          package = json.loads(Path('package.json').read_text(encoding='utf-8'))

          candidates = []
          for marker in ('}\n{', '}\r\n{', '}{'):
              start = 0
              while True:
                  index = source.find(marker, start)
                  if index < 0:
                      break
                  candidates.append(index + 1)
                  start = index + 1
          candidates.append(len(source))

          document = None
          end = None
          for candidate_end in sorted(set(candidates)):
              try:
                  parsed = json.loads(source[:candidate_end])
              except json.JSONDecodeError:
                  continue
              root = parsed.get('packages', {}).get('', {})
              if parsed.get('name') != package.get('name'):
                  continue
              if parsed.get('lockfileVersion') != 3:
                  continue
              if root.get('version') != package.get('version'):
                  continue
              document = parsed
              end = candidate_end
              break

          if document is None:
              raise SystemExit('Nenhum documento package-lock completo foi encontrado antes da concatenação.')

          trailing = source[end:].strip()
          print(f'Documento válido encontrado em {end} caracteres; {len(trailing)} caracteres excedentes removidos.')
          path.write_text(json.dumps(document, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          json.loads(path.read_text(encoding='utf-8'))

      - name: Validar instalação reproduzível
        run: npm ci

      - name: Publicar lockfile reparado
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet -- package-lock.json; then
            echo 'Nenhuma alteração necessária.'
            exit 0
          fi
          git add package-lock.json
          git commit -m 'fix: repair duplicated package-lock document'
          git push origin HEAD:activate/supabase-production
