name: Reparar package-lock

on:
  pull_request:
    paths:
      - '.github/workflows/repair-package-lock.yml'
      - 'package-lock.json'

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'activate/supabase-production'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Obter branch de ativação
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: activate/supabase-production
          fetch-depth: 0

      - name: Extrair lockfile compatível com package.json
        shell: python
        run: |
          import json
          import re
          from pathlib import Path

          path = Path('package-lock.json')
          source = path.read_text(encoding='utf-8-sig')
          package = json.loads(Path('package.json').read_text(encoding='utf-8'))
          expected_dev = package.get('devDependencies', {})
          expected_prod = package.get('dependencies', {})
          decoder = json.JSONDecoder()

          matches = list(re.finditer(r'\{\s*"name"\s*:\s*"radar-pdde"', source))
          candidates = []
          for match in matches:
              try:
                  parsed, end = decoder.raw_decode(source, match.start())
              except json.JSONDecodeError:
                  continue
              root = parsed.get('packages', {}).get('', {})
              candidates.append((match.start(), end, parsed, root))

          compatible = [
              item for item in candidates
              if item[2].get('lockfileVersion') == 3
              and item[3].get('name') == package.get('name')
              and item[3].get('version') == package.get('version')
              and item[3].get('devDependencies', {}) == expected_dev
              and item[3].get('dependencies', {}) == expected_prod
          ]

          if len(compatible) != 1:
              summary = [
                  {
                      'start': start,
                      'end': end,
                      'devCount': len(root.get('devDependencies', {})),
                      'prodCount': len(root.get('dependencies', {}))
                  }
                  for start, end, _, root in candidates
              ]
              raise SystemExit(
                  f'Esperado exatamente um lockfile compatível; encontrados {len(compatible)}. '
                  f'Candidatos: {summary}'
              )

          start, end, document, _ = compatible[0]
          print(f'Lockfile compatível encontrado entre {start} e {end} de {len(source)} caracteres.')
          path.write_text(json.dumps(document, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          json.loads(path.read_text(encoding='utf-8'))

      - name: Validar instalação reproduzível
        run: npm ci

      - name: Publicar lockfile reparado
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet -- package-lock.json; then
            echo 'Nenhuma alteração necessária.'
            exit 0
          fi
          git add package-lock.json
          git commit -m 'fix: repair duplicated package-lock document'
          git push origin HEAD:activate/supabase-production
