name: Publicar Preview Vercel prebuilt

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Digite PUBLICAR_PREVIEW_PREBUILT
        required: true
        type: string

permissions:
  contents: read

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  preview-prebuilt:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: preview
    steps:
      - name: Checkout do commit autorizado
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm
      - name: Instalar dependências reproduzíveis
        run: npm ci
      - name: Validar autorização do Preview
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          test "${CONFIRMATION}" = "PUBLICAR_PREVIEW_PREBUILT"
          test -n "${VERCEL_TOKEN}"
          test -n "${VERCEL_ORG_ID}"
          test -n "${VERCEL_PROJECT_ID}"
      - name: Obter configuração isolada do Preview
        run: npx --yes vercel@56.2.0 pull --yes --environment=preview --token="${VERCEL_TOKEN}"
      - name: Executar build versionado da Vercel
        run: npx --yes vercel@56.2.0 build --token="${VERCEL_TOKEN}"
      - name: Confirmar manifesto público do Preview
        run: |
          test -f dist/radar-build-manifest.json
          node <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('dist/radar-build-manifest.json', 'utf8'));
          const expected = {
            vercelEnvironment: 'preview',
            runtimeEnvironment: 'preview',
            dataMode: 'supabase-preview',
            supabaseRepositoryEnabled: true,
            productionActivationApproved: false
          };
          for (const [key, value] of Object.entries(expected)) {
            if (manifest[key] !== value) {
              throw new Error(`Manifesto de Preview inválido em ${key}: ${JSON.stringify(manifest[key])}`);
            }
          }
          const serialized = JSON.stringify(manifest);
          if (/sb_secret_|service_role|password|publishableKey|supabaseUrl/i.test(serialized)) {
            throw new Error('Manifesto contém campo ou material público proibido.');
          }
          NODE
      - name: Publicar somente o artefato prebuilt de Preview
        run: npx --yes vercel@56.2.0 deploy --prebuilt --token="${VERCEL_TOKEN}"
      - name: Publicar manifesto público como evidência
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: radar-vercel-preview-manifest-${{ github.run_id }}
          path: dist/radar-build-manifest.json
          if-no-files-found: warn
          retention-days: 14
