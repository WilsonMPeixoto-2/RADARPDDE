name: Diagnóstico readiness Preview

on:
  pull_request:
    paths:
      - '.github/workflows/diagnostico-readiness-preview.yml'
      - '.github/workflows/configurar-e-publicar-preview-supabase.yml'
      - 'scripts/check-supabase-readiness.js'
      - 'scripts/check-supabase-final-alignment.js'
      - 'docs/runbooks/SUPABASE_CONNECTION.md'
      - 'package.json'
      - 'tests/unit/vercel-preview-workflow.test.js'

permissions:
  contents: read

jobs:
  diagnostico:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm
      - name: Instalar dependências
        run: npm ci
      - name: Sintaxe
        run: npm run check
      - name: Testes unitários
        run: npm run test:unit
      - name: Testes de integração
        run: npm run test:integration
      - name: Contrato Supabase
        run: npm run check:supabase
      - name: Alinhamento final
        run: npm run check:supabase-final
      - name: Configuração de runtime
        run: npm run check:runtime-config
      - name: Artefatos gerados
        run: npm run check:generated
      - name: Tipos do banco
        run: npm run typecheck:database
      - name: Auditoria funcional
        run: npm run audit:functional
