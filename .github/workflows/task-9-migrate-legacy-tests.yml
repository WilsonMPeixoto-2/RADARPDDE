name: Finalizar migração dos testes da Task 9

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  migrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Obter código
        uses: actions/checkout@v4
        with:
          ref: feature/ciclo-a-task-9-pendencias-navegaveis
          fetch-depth: 0

      - name: Corrigir expectativas e caracteres de controle
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          pendency_path = Path('tests/e2e/pendency-cycle.spec.js')
          pendency = pendency_path.read_text(encoding='utf-8')
          pendency = pendency.replace(chr(8), r'\b')

          open_pattern = re.compile(
              r"page\.getByRole\(\s*'button'\s*,\s*\{\s*name:\s*'Ativas\s*\(\d+\)'\s*,\s*exact:\s*true\s*\}\s*\)",
              re.DOTALL,
          )
          resolved_pattern = re.compile(
              r"page\.getByRole\(\s*'button'\s*,\s*\{\s*name:\s*'Histórico Resolvidas\s*\(\d+\)'\s*,\s*exact:\s*true\s*\}\s*\)",
              re.DOTALL,
          )
          pendency = open_pattern.sub(
              lambda _: r"page.getByRole('tab', { name: /^Abertas\b/ })",
              pendency,
          )
          pendency = resolved_pattern.sub(
              lambda _: r"page.getByRole('tab', { name: /^Resolvidas\b/ })",
              pendency,
          )
          pendency_path.write_text(pendency, encoding='utf-8')

          functional_path = Path('tests/e2e/functional-core.spec.js')
          functional = functional_path.read_text(encoding='utf-8')
          functional = functional.replace(
              "await legacyRow.getByRole('button', { name: 'Ver Unidade', exact: true }).click();",
              "await legacyRow.getByRole('button', { name: 'Abrir no Prontuário', exact: true }).click();",
          )
          functional_path.write_text(functional, encoding='utf-8')
          PY

      - name: Validar alterações
        run: |
          git diff --check
          node --check tests/e2e/pendency-cycle.spec.js
          node --check tests/e2e/functional-core.spec.js
          if grep -P -n "\x08" tests/e2e/pendency-cycle.spec.js; then
            echo "Caractere de controle residual encontrado."
            exit 1
          fi

      - name: Salvar e remover o aplicador temporário
        run: |
          git rm .github/workflows/task-9-migrate-legacy-tests.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/pendency-cycle.spec.js tests/e2e/functional-core.spec.js
          git commit -m "test: alinhar regressões legadas à Task 9"
          git push origin HEAD:feature/ciclo-a-task-9-pendencias-navegaveis
