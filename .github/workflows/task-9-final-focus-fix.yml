name: Corrigir foco final da Task 9

on:
  push:
    branches:
      - feature/ciclo-a-task-9-pendencias-navegaveis

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Obter branch da Task 9
        uses: actions/checkout@v4
        with:
          ref: feature/ciclo-a-task-9-pendencias-navegaveis
          fetch-depth: 0

      - name: Corrigir último locator de foco duplicado
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/e2e/pendency-cycle.spec.js')
          text = path.read_text(encoding='utf-8')
          old = (
              "    await expect(page.getByRole('button', {\n"
              "      name: 'Registrar substituição mais recente',\n"
              "      exact: true\n"
              "    })).toBeFocused();"
          )
          new = (
              "    const focusedAfterReplacement = page.locator(':focus');\n"
              "    await expect(focusedAfterReplacement)\n"
              "      .toHaveAttribute('data-action', 'register-corrective-submission');\n"
              "    await expect(focusedAfterReplacement)\n"
              "      .toHaveText('Registrar substituição mais recente');"
          )
          count = text.count(old)
          print({'quantidade': count})
          if count != 1:
              raise SystemExit(f'Trecho esperado uma vez, encontrado {count}.')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Validar e publicar correção
        run: |
          test "$(wc -c < tests/e2e/pendency-cycle.spec.js)" -gt 100000
          node --check tests/e2e/pendency-cycle.spec.js
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/pendency-cycle.spec.js
          git commit -m "test: desambiguar foco após substituição corretiva"
          git push origin HEAD:feature/ciclo-a-task-9-pendencias-navegaveis
