name: Testes E2E Playwright

on:
  pull_request:
    paths:
      - '**/*.js'
      - '**/*.html'
      - '**/*.css'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.js'
      - '.github/workflows/playwright-mobile.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playwright-mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile:
    name: Desktop, Android e iPhone
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Obter código
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Configurar Node.js LTS
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependências reproduzíveis
        run: npm ci

      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium webkit

      - name: Executar testes E2E completos
        run: npm run test:e2e

      - name: Publicar relatório de execução
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-mobile
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
