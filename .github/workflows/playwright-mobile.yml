name: Testes E2E Playwright

on:
  pull_request:
    paths:
      - '**/*.js'
      - '**/*.html'
      - '**/*.css'
      - 'package.json'
      - 'playwright.config.js'
      - '.github/workflows/playwright-mobile.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: playwright-mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrate-cycle-b-regressions:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Obter branch do pacote
        uses: actions/checkout@v4
        with:
          ref: feature/ciclo-a-pacote-operacional-retificacao
          fetch-depth: 0

      - name: Aplicar migração explícita
        run: |
          python scripts/migrate-cycle-b-regression-tests.py
          test "$(wc -c < tests/e2e/pendency-cycle.spec.js)" -gt 100000
          node --check tests/e2e/pendency-cycle.spec.js
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/pendency-cycle.spec.js
          git commit -m "test: alinhar regressões ao Dashboard e à Carteira do Ciclo B"
          git push origin HEAD:feature/ciclo-a-pacote-operacional-retificacao

  mobile:
    name: Desktop, Android e iPhone
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Obter código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm install

      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium webkit

      - name: Executar testes E2E completos
        run: npm run test:e2e

      - name: Publicar relatório em caso de falha
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-mobile
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
