name: Testes E2E Playwright

on:
  pull_request:
    paths:
      - '**/*.js'
      - '**/*.html'
      - '**/*.css'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.js'
      - '.github/workflows/playwright-mobile.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: playwright-mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile:
    name: Desktop, Android e iPhone
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Obter código
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configurar Node.js LTS
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependências reproduzíveis
        run: npm ci

      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium webkit

      - name: Executar testes E2E completos
        run: npm run test:e2e

      - name: Publicar relatório de execução
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report-mobile
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
