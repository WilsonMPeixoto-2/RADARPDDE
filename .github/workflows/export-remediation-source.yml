name: Publicar hardening Supabase validado

on:
  pull_request:
    paths:
      - '.github/workflows/export-remediation-source.yml'

permissions:
  contents: write

jobs:
  publish-task7-code:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout do branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Aplicar conjunto já validado
        shell: bash
        run: |
          set -euo pipefail
          cat .github/task7-security.part.0 .github/task7-security.part.1 > /tmp/task7.patch.gz.b64
          base64 --decode /tmp/task7.patch.gz.b64 | gzip --decompress > /tmp/task7.patch
          test "$(sha256sum /tmp/task7.patch | awk '{print $1}')" = "4cbf2d9275371a0b84429585935a6eae1991bf88aa5d51dad9f92176334d38e7"
          git apply --check /tmp/task7.patch
          git apply /tmp/task7.patch
          sed -i 's/select plan(22);/select plan(23);/' supabase/tests/database/security-hardening.test.sql
          git rm .github/task7-security.part.0 .github/task7-security.part.1
          git checkout HEAD -- .github/workflows/supabase-readiness.yml .github/workflows/supabase-remote-post-apply.yml
          git diff --check

      - name: Publicar código, migration, função e testes
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'security: endurecer funções, RLS e CORS do Supabase'
          git push origin "HEAD:${HEAD_REF}"
