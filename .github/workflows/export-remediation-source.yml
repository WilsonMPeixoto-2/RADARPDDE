name: Diagnose Task 5 patch transport

on:
  pull_request:
    paths:
      - '.github/workflows/export-remediation-source.yml'

permissions:
  contents: write

jobs:
  diagnose-task5:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout do branch da remediação
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Coletar diagnóstico do transporte
        shell: bash
        run: |
          set -u
          REPORT=.github/task5-diagnostics.txt
          : > "$REPORT"
          echo "head=$(git rev-parse HEAD)" >> "$REPORT"
          for part in 00 01 02 03 04 05; do
            file=".github/task5-readiness.part${part}"
            if test -f "$file"; then
              echo "part${part}_bytes=$(wc -c < "$file" | tr -d ' ')" >> "$REPORT"
              echo "part${part}_sha256=$(sha256sum "$file" | awk '{print $1}')" >> "$REPORT"
            else
              echo "part${part}_missing=true" >> "$REPORT"
            fi
          done
          cat .github/task5-readiness.part00 \
              .github/task5-readiness.part01 \
              .github/task5-readiness.part02 \
              .github/task5-readiness.part03 \
              .github/task5-readiness.part04 \
              .github/task5-readiness.part05 > "$RUNNER_TEMP/task5.patch.gz.b64"
          echo "combined_b64_bytes=$(wc -c < "$RUNNER_TEMP/task5.patch.gz.b64" | tr -d ' ')" >> "$REPORT"
          echo "combined_b64_sha256=$(sha256sum "$RUNNER_TEMP/task5.patch.gz.b64" | awk '{print $1}')" >> "$REPORT"
          set +e
          base64 --decode "$RUNNER_TEMP/task5.patch.gz.b64" > "$RUNNER_TEMP/task5.patch.gz" 2> "$RUNNER_TEMP/base64.err"
          base64_rc=$?
          gzip -dc "$RUNNER_TEMP/task5.patch.gz" > "$RUNNER_TEMP/task5.patch" 2> "$RUNNER_TEMP/gzip.err"
          gzip_rc=$?
          git apply --check -p1 "$RUNNER_TEMP/task5.patch" > "$RUNNER_TEMP/apply.out" 2> "$RUNNER_TEMP/apply.err"
          apply_rc=$?
          set -e
          echo "base64_rc=${base64_rc}" >> "$REPORT"
          echo "gzip_rc=${gzip_rc}" >> "$REPORT"
          echo "decoded_gzip_bytes=$(wc -c < "$RUNNER_TEMP/task5.patch.gz" | tr -d ' ')" >> "$REPORT"
          echo "decoded_gzip_sha256=$(sha256sum "$RUNNER_TEMP/task5.patch.gz" | awk '{print $1}')" >> "$REPORT"
          echo "patch_bytes=$(wc -c < "$RUNNER_TEMP/task5.patch" | tr -d ' ')" >> "$REPORT"
          echo "patch_sha256=$(sha256sum "$RUNNER_TEMP/task5.patch" | awk '{print $1}')" >> "$REPORT"
          echo "base64_error=$(tr '\n' ' ' < "$RUNNER_TEMP/base64.err")" >> "$REPORT"
          echo "gzip_error=$(tr '\n' ' ' < "$RUNNER_TEMP/gzip.err")" >> "$REPORT"
          echo "git_apply_check_rc=${apply_rc}" >> "$REPORT"
          echo "git_apply_stdout=$(tr '\n' ' ' < "$RUNNER_TEMP/apply.out")" >> "$REPORT"
          echo "git_apply_stderr=$(tr '\n' ' ' < "$RUNNER_TEMP/apply.err")" >> "$REPORT"
          cat "$REPORT"

      - name: Publicar diagnóstico
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/task5-diagnostics.txt
          git commit -m 'chore: registrar diagnóstico do patch da etapa 5'
          git push origin "HEAD:${HEAD_REF}"
