name: Diagnosticar patch de observabilidade

on:
  pull_request:
    paths:
      - '.github/workflows/export-remediation-source.yml'

permissions:
  contents: read

jobs:
  diagnose-patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout do branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Diagnosticar integridade e aplicabilidade
        id: diagnose
        shell: bash
        run: |
          set +e
          {
            echo "HEAD=$(git rev-parse HEAD)"
            echo "PATCH_B64_BYTES=$(wc -c < .github/task6-observability.patch.b64)"
            base64 --decode .github/task6-observability.patch.b64 > /tmp/task6-observability.patch
            decode_status=$?
            echo "DECODE_STATUS=${decode_status}"
            echo "PATCH_BYTES=$(wc -c < /tmp/task6-observability.patch)"
            echo "PATCH_SHA256=$(sha256sum /tmp/task6-observability.patch | awk '{print $1}')"
            git apply --check --verbose /tmp/task6-observability.patch
            apply_status=$?
            echo "APPLY_CHECK_STATUS=${apply_status}"
          } > /tmp/task6-patch-diagnostic.txt 2>&1
          cat /tmp/task6-patch-diagnostic.txt
          exit "${apply_status:-1}"

      - name: Publicar diagnóstico exato
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: task6-patch-diagnostic-${{ github.run_id }}
          path: /tmp/task6-patch-diagnostic.txt
          if-no-files-found: error
          retention-days: 1
