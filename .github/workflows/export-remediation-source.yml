name: Diagnosticar estado final da Task 6

on:
  pull_request:
    paths:
      - '.github/workflows/export-remediation-source.yml'

permissions:
  contents: read

jobs:
  diagnose-final-task6:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout do branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Reproduzir estado final
        run: |
          base64 --decode .github/task6-observability.patch.b64 | gzip --decompress > /tmp/task6.patch
          git apply /tmp/task6.patch
          rm .github/task6-observability.patch.b64
          cat > .github/workflows/export-remediation-source.yml <<'YAML'
          name: Export remediation source

          on:
            pull_request:
              paths:
                - '.github/remediation-export-trigger.txt'
                - '.github/workflows/export-remediation-source.yml'

          permissions:
            contents: read

          jobs:
            export-source:
              runs-on: ubuntu-latest
              timeout-minutes: 12
              steps:
                - name: Checkout
                  uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
                - name: Configurar Node.js 24
                  uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
                  with:
                    node-version: '24'
                    cache: npm
                    cache-dependency-path: package-lock.json
                - name: Instalar dependências reproduzíveis
                  run: npm ci
                - name: Empacotar código-fonte e dependências
                  run: |
                    tar --exclude='.git' --exclude='node_modules' --exclude='playwright-report' --exclude='test-results' -czf "$RUNNER_TEMP/radar-remediation-source.tar.gz" .
                    tar -czf "$RUNNER_TEMP/radar-remediation-node-modules.tar.gz" node_modules
                - name: Publicar código-fonte temporário
                  uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
                  with:
                    name: radar-remediation-source-${{ github.sha }}
                    path: |
                      ${{ runner.temp }}/radar-remediation-source.tar.gz
                      ${{ runner.temp }}/radar-remediation-node-modules.tar.gz
                    if-no-files-found: error
                    retention-days: 1
          YAML
          git diff --check

      - name: Executar testes com log completo
        id: tests
        shell: bash
        run: |
          set +e
          {
            echo '=== STATUS ==='
            git status --short
            echo '=== CHECK ==='
            npm run check
            check_status=$?
            echo "CHECK_STATUS=${check_status}"
            echo '=== UNIT ==='
            npm run test:unit
            unit_status=$?
            echo "UNIT_STATUS=${unit_status}"
            echo '=== INTEGRATION ==='
            npm run test:integration
            integration_status=$?
            echo "INTEGRATION_STATUS=${integration_status}"
            test ${check_status} -eq 0 -a ${unit_status} -eq 0 -a ${integration_status} -eq 0
          } > /tmp/task6-final-tests.log 2>&1
          status=$?
          tail -n 240 /tmp/task6-final-tests.log
          exit ${status}

      - name: Publicar log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: task6-final-tests-${{ github.run_id }}
          path: /tmp/task6-final-tests.log
          if-no-files-found: error
          retention-days: 1
