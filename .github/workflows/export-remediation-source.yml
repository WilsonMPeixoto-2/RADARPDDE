name: Diagnosticar validação remota pós-migration

on:
  pull_request:
    paths:
      - '.github/workflows/export-remediation-source.yml'

permissions:
  contents: read

env:
  SUPABASE_TELEMETRY_DISABLED: '1'
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  PGPASS_REMOTE: ${{ secrets.SUPABASE_DB_PASSWORD }}
  PROJECT_REF: scnryinorqeucbfkioxo

jobs:
  validate-production:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Vincular produção e confirmar contrato
        shell: bash
        run: |
          set -euo pipefail
          npx --no-install supabase link --project-ref "${PROJECT_REF}" --password "${PGPASS_REMOTE}"
          npx --no-install supabase db query --linked --file supabase/verification/remote-post-apply.sql > remote-post-apply.log 2>&1
          cat remote-post-apply.log

      - name: Executar lint remoto com log integral
        id: lint
        shell: bash
        run: |
          set +e
          npx --no-install supabase db lint --linked --schema public --level warning --fail-on error > remote-lint.log 2>&1
          status=$?
          cat remote-lint.log
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Executar pgTAP remoto reversível com log integral
        id: pgtap
        shell: bash
        run: |
          set +e
          npx --no-install supabase test db supabase/tests/database --linked > remote-pgtap.log 2>&1
          status=$?
          cat remote-pgtap.log
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publicar diagnósticos
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: supabase-production-validation-${{ github.run_id }}
          path: |
            remote-post-apply.log
            remote-lint.log
            remote-pgtap.log
          if-no-files-found: error
          retention-days: 14

      - name: Reprovar após preservar diagnósticos
        if: steps.lint.outputs.status != '0' || steps.pgtap.outputs.status != '0'
        run: exit 1
