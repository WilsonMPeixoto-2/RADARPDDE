name: Corrigir papel do pgTAP remoto

on:
  pull_request:
    paths:
      - '.github/workflows/export-remediation-source.yml'

permissions:
  contents: write

env:
  SUPABASE_TELEMETRY_DISABLED: '1'

jobs:
  fix-pgtap-role:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout do branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Tornar o papel de teste explícito
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const directory = 'supabase/tests/database';
          const files = fs.readdirSync(directory)
            .filter(name => name.endsWith('.test.sql'))
            .sort();

          for (const name of files) {
            const file = path.join(directory, name);
            let source = fs.readFileSync(file, 'utf8');
            if (!source.startsWith('begin;\n')) {
              throw new Error(`Teste não inicia com transação: ${file}`);
            }
            if (!source.startsWith('begin;\nset local role postgres;\n')) {
              source = source.replace('begin;\n', 'begin;\nset local role postgres;\n');
            }
            source = source.replace(/^reset role;$/gm, 'set local role postgres;');
            fs.writeFileSync(file, source);
          }
          NODE
          git diff --check

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Validar pgTAP na pilha local completa
        shell: bash
        run: |
          set -euo pipefail
          npm run supabase:start
          npm run supabase:reset
          npm run supabase:test:db
          npm run supabase:lint:db

      - name: Encerrar Supabase local
        if: always()
        run: npm run supabase:stop || true

      - name: Publicar harness validado
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add supabase/tests/database
          git diff --cached --check
          git commit -m 'test: executar pgTAP remoto sob papel postgres explícito'
          git push origin "HEAD:${HEAD_REF}"
