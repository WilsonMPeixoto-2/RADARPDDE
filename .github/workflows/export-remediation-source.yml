name: Diagnosticar pgTAP em Supabase Production

on:
  pull_request:
    paths:
      - '.github/workflows/export-remediation-source.yml'

permissions:
  contents: read

env:
  SUPABASE_TELEMETRY_DISABLED: '1'
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  PGPASS_REMOTE: ${{ secrets.SUPABASE_DB_PASSWORD }}
  PROJECT_REF: scnryinorqeucbfkioxo

jobs:
  diagnose-production-pgtap:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Vincular e confirmar contrato
        run: |
          npx --no-install supabase link --project-ref "${PROJECT_REF}" --password "${PGPASS_REMOTE}"
          npx --no-install supabase db query --linked --file supabase/verification/remote-post-apply.sql

      - name: Executar pgTAP remoto com log integral
        id: pgtap
        shell: bash
        run: |
          set +e
          npx --no-install supabase test db supabase/tests/database --linked > remote-pgtap-after-install.log 2>&1
          status=$?
          cat remote-pgtap-after-install.log
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publicar log completo
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: remote-pgtap-after-install-${{ github.run_id }}
          path: remote-pgtap-after-install.log
          if-no-files-found: error
          retention-days: 14

      - name: Reprovar após preservar diagnóstico
        if: steps.pgtap.outputs.status != '0'
        run: exit 1
