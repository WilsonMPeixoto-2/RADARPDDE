name: Diagnose Task 5 unit test flakiness

on:
  pull_request:
    paths:
      - '.github/workflows/export-remediation-source.yml'

permissions:
  contents: write

jobs:
  diagnose-flaky-unit-tests:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout do branch da remediação
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Reconstruir e aplicar patch verificado
        shell: bash
        run: |
          set -euo pipefail
          cat .github/task5-readiness.part00 \
              .github/task5-readiness.part01 \
              .github/task5-readiness.part02 \
              .github/task5-readiness.part03 \
              .github/task5-readiness.part04 \
              .github/task5-readiness.part05 > "$RUNNER_TEMP/task5.patch.gz.b64"
          base64 --decode "$RUNNER_TEMP/task5.patch.gz.b64" | gzip -dc > "$RUNNER_TEMP/task5.patch"
          printf '%s  %s\n' 'bdf7e2ff908ca21e15c96a60318e12e70612d968eaf298d96f70a47263214cea' "$RUNNER_TEMP/task5.patch" | sha256sum -c -
          git apply --check -p1 "$RUNNER_TEMP/task5.patch"
          git apply -p1 "$RUNNER_TEMP/task5.patch"

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependências reproduzíveis
        run: npm ci

      - name: Repetir suíte e comparar execução serial
        shell: bash
        run: |
          set +e
          REPORT=.github/task5-flaky-unit-diagnostics.txt
          : > "$REPORT"
          echo "head=$(git rev-parse HEAD)" >> "$REPORT"
          echo "node=$(node --version)" >> "$REPORT"
          echo "npm=$(npm --version)" >> "$REPORT"
          failure_iteration=0
          for iteration in 1 2 3 4 5 6 7 8; do
            npm run test:unit > "$RUNNER_TEMP/unit-${iteration}.log" 2>&1
            rc=$?
            echo "parallel_iteration_${iteration}_rc=${rc}" >> "$REPORT"
            if test "$rc" -ne 0; then
              failure_iteration=$iteration
              break
            fi
          done
          echo "first_failure_iteration=${failure_iteration}" >> "$REPORT"
          if test "$failure_iteration" -ne 0; then
            echo '--- parallel failure ---' >> "$REPORT"
            grep -n -C 16 '^not ok' "$RUNNER_TEMP/unit-${failure_iteration}.log" >> "$REPORT" || true
            tail -n 40 "$RUNNER_TEMP/unit-${failure_iteration}.log" >> "$REPORT"
          fi
          node --test --test-concurrency=1 tests/unit/*.test.js > "$RUNNER_TEMP/unit-serial.log" 2>&1
          serial_rc=$?
          echo "serial_rc=${serial_rc}" >> "$REPORT"
          if test "$serial_rc" -ne 0; then
            echo '--- serial failure ---' >> "$REPORT"
            grep -n -C 16 '^not ok' "$RUNNER_TEMP/unit-serial.log" >> "$REPORT" || true
            tail -n 40 "$RUNNER_TEMP/unit-serial.log" >> "$REPORT"
          fi
          set -e
          cat "$REPORT"

      - name: Publicar diagnóstico de intermitência
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/task5-flaky-unit-diagnostics.txt
          git commit -m 'chore: registrar intermitência unitária da etapa 5'
          git push origin "HEAD:${HEAD_REF}"
