name: Diagnosticar readiness do hardening

on:
  pull_request:
    paths:
      - '.github/workflows/export-remediation-source.yml'

permissions:
  contents: read

jobs:
  diagnose-task7-readiness:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout do branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Reproduzir hardening e estado inventariado
        run: |
          cat .github/task7-security.part.0 .github/task7-security.part.1 > /tmp/task7.b64
          base64 --decode /tmp/task7.b64 | gzip --decompress > /tmp/task7.patch
          git apply /tmp/task7.patch
          git rm .github/task7-security.part.0 .github/task7-security.part.1
          git show 58ec9f02a02d8b15918413ffc4cbb395520c24e8:.github/workflows/export-remediation-source.yml > .github/workflows/export-remediation-source.yml
          git add .github/workflows/export-remediation-source.yml
          git diff --check

      - name: Executar readiness com log completo
        id: readiness
        shell: bash
        run: |
          set +e
          npm run test:readiness > /tmp/task7-readiness.log 2>&1
          status=$?
          tail -n 240 /tmp/task7-readiness.log
          exit ${status}

      - name: Publicar log completo
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: task7-readiness-${{ github.run_id }}
          path: /tmp/task7-readiness.log
          if-no-files-found: error
          retention-days: 1
