name: Publicar observabilidade validada

on:
  pull_request:
    paths:
      - '.github/workflows/export-remediation-source.yml'

permissions:
  contents: write

jobs:
  publish-task6:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout do branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Aplicar patch íntegro
        run: |
          base64 --decode .github/task6-observability.patch.b64 | gzip --decompress > /tmp/task6.patch
          test "$(sha256sum /tmp/task6.patch | awk '{print $1}')" = "073a03f06984fe69305aef608df2bf610ff10d1b2e93a8f17bda75b73a544cb7"
          git apply --check /tmp/task6.patch
          git apply /tmp/task6.patch
          git rm .github/task6-observability.patch.b64
          git diff --check

      - name: Restaurar workflow permanente antes dos validadores
        shell: bash
        run: |
          cat > .github/workflows/export-remediation-source.yml <<'YAML'
          name: Export remediation source

          on:
            pull_request:
              paths:
                - '.github/remediation-export-trigger.txt'
                - '.github/workflows/export-remediation-source.yml'

          permissions:
            contents: read

          jobs:
            export-source:
              runs-on: ubuntu-latest
              timeout-minutes: 12
              steps:
                - name: Checkout
                  uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
                - name: Configurar Node.js 24
                  uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
                  with:
                    node-version: '24'
                    cache: npm
                    cache-dependency-path: package-lock.json
                - name: Instalar dependências reproduzíveis
                  run: npm ci
                - name: Empacotar código-fonte e dependências
                  run: |
                    tar --exclude='.git' --exclude='node_modules' --exclude='playwright-report' --exclude='test-results' -czf "$RUNNER_TEMP/radar-remediation-source.tar.gz" .
                    tar -czf "$RUNNER_TEMP/radar-remediation-node-modules.tar.gz" node_modules
                - name: Publicar código-fonte temporário
                  uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
                  with:
                    name: radar-remediation-source-${{ github.sha }}
                    path: |
                      ${{ runner.temp }}/radar-remediation-source.tar.gz
                      ${{ runner.temp }}/radar-remediation-node-modules.tar.gz
                    if-no-files-found: error
                    retention-days: 1
          YAML
          git add .github/workflows/export-remediation-source.yml
          git diff --check

      - name: Reconfirmar suíte Node 24
        run: |
          npm run check
          npm run test:unit
          npm run test:integration

      - name: Validar UX de erro no Chromium
        run: |
          npx playwright install --with-deps chromium
          npx playwright test tests/e2e/data-error-ux.spec.js --project=desktop-chromium

      - name: Publicar Task 6
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'feat: adicionar observabilidade e mensagens verdadeiras'
          git push origin "HEAD:${HEAD_REF}"
