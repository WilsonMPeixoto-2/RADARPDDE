name: Diagnosticar banco da Task 7

on:
  pull_request:
    paths:
      - '.github/workflows/export-remediation-source.yml'

permissions:
  contents: read

env:
  SUPABASE_TELEMETRY_DISABLED: '1'

jobs:
  diagnose-task7-db:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout do branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Aplicar hardening
        run: |
          cat .github/task7-security.part.0 .github/task7-security.part.1 > /tmp/task7.b64
          base64 --decode /tmp/task7.b64 | gzip --decompress > /tmp/task7.patch
          git apply /tmp/task7.patch

      - name: Iniciar e recriar Supabase local
        run: |
          npm run supabase:start
          npm run supabase:reset

      - name: Executar verificações separadamente
        id: checks
        shell: bash
        run: |
          set +e
          {
            echo '=== REMOTE PREFLIGHT ==='
            npx --no-install supabase db query --local --file supabase/verification/remote-preflight.sql
            preflight=$?
            echo "PREFLIGHT_STATUS=${preflight}"
            echo '=== REMOTE POST APPLY ==='
            npx --no-install supabase db query --local --file supabase/verification/remote-post-apply.sql
            postapply=$?
            echo "POST_APPLY_STATUS=${postapply}"
            echo '=== PGTAP ==='
            npm run supabase:test:db
            pgtap=$?
            echo "PGTAP_STATUS=${pgtap}"
            echo '=== LINT ==='
            npm run supabase:lint:db
            lint=$?
            echo "LINT_STATUS=${lint}"
            test ${preflight} -eq 0 -a ${postapply} -eq 0 -a ${pgtap} -eq 0 -a ${lint} -eq 0
          } > /tmp/task7-db.log 2>&1
          status=$?
          tail -n 260 /tmp/task7-db.log
          exit ${status}

      - name: Encerrar Supabase local
        if: always()
        run: npm run supabase:stop || true

      - name: Publicar diagnóstico completo
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: task7-db-${{ github.run_id }}
          path: /tmp/task7-db.log
          if-no-files-found: error
          retention-days: 1
