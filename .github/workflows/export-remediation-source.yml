name: Fix verification pgTAP plan

on:
  pull_request:
    paths:
      - '.github/workflows/export-remediation-source.yml'

permissions:
  contents: write

jobs:
  fix-pgtap-plan:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout do branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Corrigir contagem declarada
        shell: bash
        run: |
          set -euo pipefail
          test "$(grep -c '^select plan(15);$' supabase/tests/database/verification-rpc.test.sql)" = '1'
          sed -i 's/^select plan(15);$/select plan(16);/' supabase/tests/database/verification-rpc.test.sql
          test "$(grep -c '^select plan(16);$' supabase/tests/database/verification-rpc.test.sql)" = '1'
          git diff --check

      - name: Publicar correção
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add supabase/tests/database/verification-rpc.test.sql
          git commit -m 'test: alinhar plano pgTAP da RPC de verificação'
          git push origin "HEAD:${HEAD_REF}"
