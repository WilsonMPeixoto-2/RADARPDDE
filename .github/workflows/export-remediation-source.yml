name: Publicar gate operacional Supabase

on:
  pull_request:
    paths:
      - '.github/hml-ui.patch.gz.b64'
      - '.github/workflows/export-remediation-source.yml'

permissions:
  contents: write

jobs:
  publish-operational-gate:
    if: github.event.pull_request.head.ref == 'qa/supabase-preview-gate-run'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout da branch operacional
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependências reproduzíveis
        run: npm ci

      - name: Aplicar gate de interface e restaurar workflow permanente
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .github/hml-ui.patch.gz.b64 | gzip --decompress > "$RUNNER_TEMP/hml-ui.patch"
          git apply --check "$RUNNER_TEMP/hml-ui.patch"
          git apply "$RUNNER_TEMP/hml-ui.patch"
          git rm .github/hml-ui.patch.gz.b64
          cat > .github/workflows/export-remediation-source.yml <<'YAML'
          name: Export remediation source

          on:
            pull_request:
              paths:
                - '.github/remediation-export-trigger.txt'
                - '.github/workflows/export-remediation-source.yml'

          permissions:
            contents: read

          jobs:
            export-source:
              runs-on: ubuntu-latest
              timeout-minutes: 12
              steps:
                - name: Checkout
                  uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

                - name: Configurar Node.js 24
                  uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
                  with:
                    node-version: '24'
                    cache: npm
                    cache-dependency-path: package-lock.json

                - name: Instalar dependências reproduzíveis
                  run: npm ci

                - name: Empacotar código-fonte e dependências
                  run: |
                    tar \
                      --exclude='.git' \
                      --exclude='node_modules' \
                      --exclude='playwright-report' \
                      --exclude='test-results' \
                      -czf "$RUNNER_TEMP/radar-remediation-source.tar.gz" .
                    tar -czf "$RUNNER_TEMP/radar-remediation-node-modules.tar.gz" node_modules

                - name: Publicar código-fonte temporário
                  uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
                  with:
                    name: radar-remediation-source-${{ github.sha }}
                    path: |
                      ${{ runner.temp }}/radar-remediation-source.tar.gz
                      ${{ runner.temp }}/radar-remediation-node-modules.tar.gz
                    if-no-files-found: error
                    retention-days: 1
          YAML
          git diff --check
          node --check scripts/ops/prepare-remote-homologation-users.mjs
          node --check scripts/ops/cleanup-remote-homologation-users.mjs
          node --check tests/e2e/supabase-preview-remote.spec.js

      - name: Executar prontidão integral
        run: npm run test:readiness

      - name: Publicar gate homologado
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'test: homologar operações reais pela interface'
          git push origin "HEAD:${HEAD_REF}"
