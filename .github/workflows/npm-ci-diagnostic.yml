name: Diagnosticar npm ci

on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/npm-ci-diagnostic.yml'
      - 'scripts/build-vercel.mjs'

permissions:
  contents: read

jobs:
  npm-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Obter código
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Configurar Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '24'
          cache: npm

      - name: Executar npm ci com diagnóstico
        id: npm-ci
        shell: bash
        run: |
          set +e
          npm ci --verbose > npm-ci-diagnostic.log 2>&1
          status=$?
          tail -n 150 npm-ci-diagnostic.log
          exit "${status}"

      - name: Publicar diagnóstico
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: npm-ci-diagnostic-${{ github.run_id }}
          path: npm-ci-diagnostic.log
          if-no-files-found: error
          retention-days: 1
