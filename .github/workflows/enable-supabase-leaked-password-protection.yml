name: Ativar proteção de senhas vazadas no Supabase

on:
  push:
    branches:
      - ops/enable-leaked-password-protection
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: enable-supabase-leaked-password-protection
  cancel-in-progress: false

jobs:
  configure-auth:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      PROJECT_REF: scnryinorqeucbfkioxo
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Validar credencial administrativa
        run: test -n "${SUPABASE_ACCESS_TOKEN}" || { echo 'SUPABASE_ACCESS_TOKEN ausente.' >&2; exit 1; }

      - name: Ler configuração Auth atual
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}/config/auth" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -o /tmp/auth-before.json
          node - <<'NODE'
          const fs = require('node:fs');
          const config = JSON.parse(fs.readFileSync('/tmp/auth-before.json', 'utf8'));
          console.log(JSON.stringify({ password_hibp_enabled: Boolean(config.password_hibp_enabled) }));
          NODE

      - name: Ativar proteção contra senhas vazadas
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            -X PATCH "https://api.supabase.com/v1/projects/${PROJECT_REF}/config/auth" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"password_hibp_enabled":true}' \
            -o /tmp/auth-patch.json

      - name: Confirmar configuração efetiva
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}/config/auth" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -o /tmp/auth-after.json
          node - <<'NODE'
          const fs = require('node:fs');
          const config = JSON.parse(fs.readFileSync('/tmp/auth-after.json', 'utf8'));
          if (config.password_hibp_enabled !== true) {
            throw new Error('LEAKED_PASSWORD_PROTECTION_NOT_ENABLED');
          }
          console.log(JSON.stringify({ ok: true, password_hibp_enabled: true }));
          NODE
