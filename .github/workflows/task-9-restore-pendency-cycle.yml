name: Restaurar teste completo da Task 9

on:
  push:
    branches:
      - feature/ciclo-a-task-9-pendencias-navegaveis

permissions:
  contents: write

jobs:
  restore:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Obter branch completa
        uses: actions/checkout@v4
        with:
          ref: feature/ciclo-a-task-9-pendencias-navegaveis
          fetch-depth: 0

      - name: Restaurar arquivo íntegro e aplicar semântica canônica
        run: |
          git show 5f5f9959bb5b53397cdc1337de894e093fca1b1e:tests/e2e/pendency-cycle.spec.js > tests/e2e/pendency-cycle.spec.js
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/e2e/pendency-cycle.spec.js')
          text = path.read_text(encoding='utf-8')
          replacements = [
              (
                  """    await expect(page.getByRole('tab', { name: /^Abertas\\b/ })).toBeVisible();
    const awaitingRow = page.locator('#p-abertas tr[data-pendency-ref]');
    await expect(awaitingRow).toContainText('Aguardando reanálise');""",
                  """    await expect(page.getByRole('tab', { name: /^Aguardando reanálise\\b/ }))
      .toHaveAttribute('aria-selected', 'true');
    const awaitingRow = page.locator('#p-aguardando tr[data-pendency-ref]');
    await expect(awaitingRow).toContainText('Aguardando reanálise');"""
              ),
              (
                  """    await expect(page.getByRole('tab', { name: /^Abertas\\b/ }))
      .toHaveClass(/active/);
    await expect(page.locator('#p-abertas')).toHaveClass(/active/);""",
                  """    await expect(page.getByRole('tab', { name: /^Aguardando reanálise\\b/ }))
      .toHaveClass(/active/);
    await expect(page.locator('#p-aguardando')).toHaveClass(/active/);"""
              ),
              (
                  "inActiveTab: Boolean(focused && focused.closest('#p-abertas'))",
                  "inActiveTab: Boolean(focused && focused.closest('#p-aguardando'))"
              ),
              (
                  """    await page.locator('#p-abertas').getByRole('button', {
      name: 'Reanalisar',
      exact: true
    }).click();""",
                  """    await page.getByRole('tab', { name: /^Aguardando reanálise\\b/ }).click();
    await page.locator('#p-aguardando').getByRole('button', {
      name: 'Reanalisar',
      exact: true
    }).click();"""
              )
          ]
          for old, new in replacements:
              count = text.count(old)
              print({'trecho': old.splitlines()[0], 'quantidade': count})
              if count != 1:
                  raise SystemExit(f'Trecho esperado uma vez, encontrado {count}.')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Validar e publicar restauração
        run: |
          test "$(wc -c < tests/e2e/pendency-cycle.spec.js)" -gt 100000
          node --check tests/e2e/pendency-cycle.spec.js
          git diff --check
          git rm .github/workflows/task-9-restore-pendency-cycle.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/pendency-cycle.spec.js
          git commit -m "test: restaurar ciclo completo e filas da Task 9"
          git push origin HEAD:feature/ciclo-a-task-9-pendencias-navegaveis
