version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 6
    rebase-strategy: auto
    groups:
      browser-quality:
        patterns:
          - "@axe-core/playwright"
          - "@playwright/test"
      supabase-tooling:
        patterns:
          - "@supabase/supabase-js"
          - "supabase"
      build-and-validation:
        patterns:
          - "acorn"
          - "acorn-walk"
          - "ajv"
          - "esbuild"
          - "http-server"
          - "prettier"
          - "typescript"
    labels:
      - dependencies
      - supabase-readiness

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    rebase-strategy: auto
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - ci
